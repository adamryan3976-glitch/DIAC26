<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Gaegu:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .whimsical-font { font-family: 'Gaegu', cursive; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhItS7qPYq98U2AlS-abawps-boJ1LF7reEUutsfAgdprCN9wh3fibwk4UurNXZ7n4/exec";
        const APP_LOGO_URL = "https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png";

        const Icon = ({ name, size = 24, className = "" }) => <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [activeTab, setActiveTab] = useState('attendance');
            const [students, setStudents] = useState([]);
            const [absences, setAbsences] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedSession, setSelectedSession] = useState('S1');
            const [selectedActivity, setSelectedActivity] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('diac_auth_user');
                const savedHoc = localStorage.getItem('diac_auth_hoc') === 'true';
                if (saved) { setIsAuth(true); setIsHoc(savedHoc); }
                fetchData();
                const interval = setInterval(fetchAbsences, 15000);
                return () => clearInterval(interval);
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const [stu, abs, sch] = await Promise.all([
                        fetch(`${SCRIPT_URL}?action=students`).then(r => r.json()),
                        fetch(`${SCRIPT_URL}?action=getAbsences`).then(r => r.json()),
                        fetch(`${SCRIPT_URL}?action=schedule`).then(r => r.json())
                    ]);
                    setStudents(stu); setAbsences(abs); setSchedule(sch);
                } finally { setLoading(false); setTimeout(() => lucide.createIcons(), 100); }
            };

            const fetchAbsences = async () => {
                const res = await fetch(`${SCRIPT_URL}?action=getAbsences`);
                const data = await res.json();
                setAbsences(data);
            };

            const toggleAttendance = async (student) => {
                const exists = absences.some(a => a.studentId === student.c && a.session === selectedSession);
                const payload = { action: exists ? 'markPresent' : 'markAbsent', studentId: student.c, studentName: student.ab, cabin: student.g, session: selectedSession, activity: selectedActivity, reportedBy: localStorage.getItem('diac_auth_user'), timestamp: new Date().toISOString() };
                setAbsences(prev => exists ? prev.filter(a => !(a.studentId === student.c && a.session === selectedSession)) : [...prev, payload]);
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(fetchAbsences, 2000);
            };

            const activities = useMemo(() => {
                const key = selectedSession.toLowerCase() === 's1' ? 'r' : selectedSession.toLowerCase() === 's2' ? 't' : selectedSession.toLowerCase() === 's3' ? 'v' : 'x';
                return Array.from(new Set(students.map(s => s[key]).filter(Boolean))).sort();
            }, [students, selectedSession]);

            const currentRoster = useMemo(() => {
                const key = selectedSession.toLowerCase() === 's1' ? 'r' : selectedSession.toLowerCase() === 's2' ? 't' : selectedSession.toLowerCase() === 's3' ? 'v' : 'x';
                return students.filter(s => s[key] === selectedActivity).sort((a, b) => a.ab.localeCompare(b.ab));
            }, [students, selectedSession, selectedActivity]);

            useEffect(() => { lucide.createIcons(); }, [activeTab, absences, selectedActivity]);

            if (!isAuth) return <Login onLogin={(hoc) => { setIsAuth(true); setIsHoc(hoc); }} />;
            if (loading) return <div className="min-h-screen flex items-center justify-center font-black whimsical-font text-2xl text-indigo-600 animate-pulse">Syncing DIAC...</div>;

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-indigo-600 text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <img src={APP_LOGO_URL} className="w-8 h-8 bg-white rounded-lg p-1" />
                            <h1 className="text-xl font-black whimsical-font">DIAC STAFF</h1>
                        </div>
                        <button onClick={fetchData} className="p-2 bg-indigo-500 rounded-xl"><Icon name="refresh-cw" size={18} /></button>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-4">
                        <div className="bg-white p-1 rounded-full shadow-sm border flex gap-1 sticky top-[80px] z-40">
                            <TabBtn active={activeTab==='attendance'} onClick={()=>setActiveTab('attendance')} icon="clipboard-check" label="Check" />
                            {isHoc && <TabBtn active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} icon="shield-alert" label="Missing" />}
                            <TabBtn active={activeTab==='roster'} onClick={()=>setActiveTab('roster')} icon="users" label="Roster" />
                            <TabBtn active={activeTab==='schedule'} onClick={()=>setActiveTab('schedule')} icon="calendar" label="Times" />
                        </div>

                        {activeTab === 'attendance' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="grid grid-cols-4 gap-2 bg-white p-2 rounded-3xl border">
                                    {['S1', 'S2', 'S3', 'S4'].map(s => <button key={s} onClick={()=>{setSelectedSession(s); setSelectedActivity('');}} className={`py-3 rounded-2xl font-black transition-all ${selectedSession===s ? 'bg-amber-400 text-amber-900 shadow-inner' : 'text-slate-400'}`}>{s}</button>)}
                                </div>
                                <select className="w-full p-4 rounded-2xl bg-white border-2 border-indigo-50 font-bold" value={selectedActivity} onChange={e=>setSelectedActivity(e.target.value)}>
                                    <option value="">Select Activity...</option>
                                    {activities.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                                <div className="grid gap-2">
                                    {currentRoster.map(s => {
                                        const abs = absences.some(a => a.studentId === s.c && a.session === selectedSession);
                                        return (
                                            <button key={s.c} onClick={()=>toggleAttendance(s)} className={`p-4 rounded-3xl border-2 flex items-center justify-between text-left transition-all ${abs ? 'bg-rose-50 border-rose-200' : 'bg-white border-white shadow-sm'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-white ${abs ? 'bg-rose-500' : 'bg-indigo-100 text-indigo-500'}`}>{s.ab.charAt(0)}</div>
                                                    <div><p className={`font-bold ${abs ? 'text-rose-900' : ''}`}>{s.ab}</p><p className="text-[10px] uppercase font-black text-slate-400">Cabin {s.g}</p></div>
                                                </div>
                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${abs ? 'bg-rose-600 border-rose-600 text-white' : 'border-slate-100 text-transparent'}`}><Icon name="check" size={14} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && isHoc && (
                            <div className="space-y-4 animate-fade-in">
                                <h2 className="whimsical-font text-2xl font-black text-rose-600">HOC Missing List</h2>
                                {absences.map((a, i) => (
                                    <div key={i} className="bg-white p-5 rounded-3xl border-2 border-rose-100 shadow-lg relative">
                                        <div className="text-[10px] font-black absolute top-4 right-4 bg-rose-600 text-white px-2 py-0.5 rounded">{a.session}</div>
                                        <h3 className="font-bold text-lg whimsical-font">{a.studentName}</h3>
                                        <p className="text-xs text-slate-500 font-bold uppercase">{a.activity} • Cabin {a.cabin}</p>
                                        <button onClick={async ()=>{
                                            await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'markPresent', studentId:a.studentId, session:a.session})});
                                            fetchAbsences();
                                        }} className="w-full mt-4 bg-emerald-500 text-white py-3 rounded-2xl font-black text-xs uppercase tracking-widest">Mark as Found</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function TabBtn({ active, onClick, icon, label }) {
            return <button onClick={onClick} className={`flex-1 py-3 rounded-full flex flex-col items-center gap-1 transition-all ${active ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>
                <Icon name={icon} size={16} />
                <span className="text-[8px] font-black uppercase tracking-tighter">{label}</span>
            </button>;
        }

        function Login({ onLogin }) {
            const [u, setU] = useState(''); const [p, setP] = useState(''); const [err, setErr] = useState('');
            const submit = async (e) => {
                e.preventDefault();
                const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`).then(r => r.json());
                if (res.success) { localStorage.setItem('diac_auth_user', u); localStorage.setItem('diac_auth_hoc', res.isHoc); onLogin(res.isHoc); }
                else setErr('Invalid Login');
            };
            return (
                <div className="min-h-screen flex items-center justify-center p-8 bg-indigo-600 text-white">
                    <form onSubmit={submit} className="w-full max-w-sm space-y-4 text-center">
                        <h1 className="text-4xl font-black whimsical-font mb-8">STAFF PORTAL</h1>
                        <input type="text" placeholder="Username" className="w-full p-5 rounded-2xl text-slate-900 font-bold" value={u} onChange={e=>setU(e.target.value)} />
                        <input type="password" placeholder="Password" className="w-full p-5 rounded-2xl text-slate-900 font-bold" value={p} onChange={e=>setP(e.target.value)} />
                        {err && <p className="text-amber-400 font-bold uppercase text-xs">{err}</p>}
                        <button className="w-full bg-amber-400 text-amber-900 py-5 rounded-2xl font-black uppercase tracking-widest">Login</button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
