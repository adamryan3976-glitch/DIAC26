<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        input { font-size: 16px !important; } /* Prevents iOS zoom on focus */
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UPDATED SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhItS7qPYq98U2AlS-abawps-boJ1LF7reEUutsfAgdprCN9wh3fibwk4UurNXZ7n4/exec";

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const stringUrl = String(url);
            if (stringUrl.includes('drive.google.com')) {
                let fileId = '';
                if (stringUrl.includes('id=')) {
                    fileId = stringUrl.split('id=')[1].split('&')[0];
                } else if (stringUrl.includes('/file/d/')) {
                    fileId = stringUrl.split('/file/d/')[1].split('/')[0];
                }
                if (fileId) return `https://lh3.googleusercontent.com/d/${fileId}=s400`;
            }
            return stringUrl;
        };

        const formatCleanDate = (dateStr) => dateStr ? String(dateStr).split(/[T ]/)[0] : "";
        const formatGrade = (gradeStr) => gradeStr ? String(gradeStr).trim() : "";

        const Icon = ({ name, size = 24, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        function App() {
            // Authentication State
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            // Data State
            const [activeTab, setActiveTab] = useState('students');
            const [searchQuery, setSearchQuery] = useState('');
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [selectedCabin, setSelectedCabin] = useState(null);
            const [refreshing, setRefreshing] = useState(false);

            // 1. Check for persistent session
            useEffect(() => {
                const savedUser = localStorage.getItem('diac_auth_user');
                if (savedUser) {
                    setIsAuthenticated(true);
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setLoginError('');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(loginData.user)}&pass=${encodeURIComponent(loginData.pass)}`);
                    const result = await res.json();
                    
                    if (result.success) {
                        localStorage.setItem('diac_auth_user', loginData.user);
                        setIsAuthenticated(true);
                        fetchData();
                    } else {
                        setLoginError('Invalid username or password.');
                    }
                } catch (err) {
                    setLoginError('Connection error. Please check your internet.');
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('diac_auth_user');
                setIsAuthenticated(false);
                setStudents([]);
            };

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const [stuRes, schRes] = await Promise.all([
                        fetch(`${SCRIPT_URL}?action=students`),
                        fetch(`${SCRIPT_URL}?action=schedule`)
                    ]);
                    const stuData = await stuRes.json();
                    const schData = await schRes.json();
                    setStudents(Array.isArray(stuData) ? stuData : []);
                    setSchedule(Array.isArray(schData) ? schData : []);
                } catch (err) {
                    console.error("Sync error:", err);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            useEffect(() => {
                lucide.createIcons();
            }, [selectedStudent, selectedCabin, activeTab, students, isAuthenticated]);

            const processedStudents = useMemo(() => {
                if (!Array.isArray(students)) return [];
                return students.map((s, index) => ({
                    uid: index, 
                    displayName: s.ab || "Unknown Student",
                    id: s.c || "N/A",
                    dob: formatCleanDate(s.d),
                    pronouns: s.f || "",
                    cabin: s.g || "Unassigned",
                    grade: formatGrade(s.m),
                    school: s.n || "",
                    photoUrl: s.o || "",
                    dietary: s.p || "",
                    allergies: s.q || "",
                    emergency: {
                        name: `${s.h || ''} ${s.i || ''}`.trim() || "Not Provided",
                        phone: s.j || "",
                        email: s.l || ""
                    },
                    sessions: [
                        { id: 1, activity: s.r, venue: s.s },
                        { id: 2, activity: s.t, venue: s.u },
                        { id: 3, activity: s.v, venue: s.w },
                        { id: 4, activity: s.x, venue: s.y }
                    ]
                })).sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));
            }, [students]);

            const cabins = useMemo(() => {
                const groups = {};
                processedStudents.forEach(s => {
                    const c = s.cabin || "Unassigned";
                    if (!groups[c]) groups[c] = [];
                    groups[c].push(s);
                });
                return Object.keys(groups).sort().map(name => ({ name, count: groups[name].length, students: groups[name] }));
            }, [processedStudents]);

            const filteredStudents = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return processedStudents.filter(s => 
                    s.displayName.toLowerCase().includes(q) || 
                    s.cabin.toString().toLowerCase().includes(q) ||
                    s.school.toLowerCase().includes(q)
                );
            }, [processedStudents, searchQuery]);

            // --- Views ---

            if (!isAuthenticated) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                    <div className="w-full max-w-sm animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-500/20">
                                <Icon name="shield-check" size={40} className="text-white" />
                            </div>
                            <h1 className="text-2xl font-black text-white tracking-tight">DIAC STAFF HUB</h1>
                            <p className="text-slate-400 text-sm mt-2 font-medium tracking-wide uppercase">Authorized Personnel Only</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-4">
                            <div className="relative">
                                <Icon name="user" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input 
                                    type="text" 
                                    placeholder="Username"
                                    required
                                    className="w-full bg-slate-800 border border-slate-700 text-white py-4 pl-12 pr-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner"
                                    value={loginData.user}
                                    onChange={e => setLoginData({...loginData, user: e.target.value})}
                                />
                            </div>
                            <div className="relative">
                                <Icon name="lock" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input 
                                    type="password" 
                                    placeholder="Password"
                                    required
                                    className="w-full bg-slate-800 border border-slate-700 text-white py-4 pl-12 pr-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner"
                                    value={loginData.pass}
                                    onChange={e => setLoginData({...loginData, pass: e.target.value})}
                                />
                            </div>
                            {loginError && (
                                <div className="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs font-bold py-3 px-4 rounded-xl text-center">
                                    {loginError}
                                </div>
                            )}
                            <button 
                                type="submit" 
                                disabled={isLoggingIn}
                                className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3"
                            >
                                {isLoggingIn ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : 'SIGN IN'}
                            </button>
                        </form>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Syncing Hub...</p>
                </div>
            );

            const InfoBlock = ({ label, value, icon, color = "text-slate-700" }) => {
                if (!value || value === "N/A" || value === "" || value === " ") return null;
                return (
                    <div className="py-3 border-b border-slate-100 last:border-0">
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] mb-1">{label}</p>
                        <div className="flex items-start gap-3">
                            {icon && <Icon name={icon} size={16} className="mt-0.5 text-slate-400 flex-shrink-0" />}
                            <p className={`text-sm font-semibold break-words ${color}`}>{value}</p>
                        </div>
                    </div>
                );
            };

            if (selectedStudent) {
                return (
                    <div className="min-h-screen bg-white pb-20 animate-fade-in">
                        <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                            <button onClick={() => setSelectedStudent(null)} className="p-2 -ml-2 active:bg-slate-800 rounded-full transition-colors"><Icon name="chevron-left" /></button>
                            <h1 className="text-lg font-bold truncate">{selectedStudent.displayName}</h1>
                        </header>
                        <div className="max-w-2xl mx-auto p-6 space-y-8">
                            <div className="flex flex-col items-center text-center">
                                <div className="w-32 h-32 rounded-3xl overflow-hidden shadow-xl border-4 border-white ring-1 ring-slate-200 mb-4 bg-slate-50 flex items-center justify-center">
                                    {selectedStudent.photoUrl ? <img src={getDirectDriveUrl(selectedStudent.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" size={48} className="text-slate-200" />}
                                </div>
                                <h2 className="text-2xl font-black text-slate-900">{selectedStudent.displayName}</h2>
                                <div className="flex gap-2 mt-3">
                                    <span className="text-[10px] font-black bg-slate-100 px-3 py-1.5 rounded-lg uppercase tracking-wider">Cabin {selectedStudent.cabin}</span>
                                    {selectedStudent.pronouns && <span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg uppercase tracking-wider">{selectedStudent.pronouns}</span>}
                                </div>
                            </div>
                            <section>
                                <h3 className="text-[11px] font-black text-slate-900 uppercase tracking-widest mb-3 flex items-center gap-2"><span className="w-2 h-2 bg-indigo-500 rounded-full"></span> Profile</h3>
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <InfoBlock label="School" value={selectedStudent.school} icon="school" />
                                    <InfoBlock label="Birthdate" value={selectedStudent.dob} icon="calendar" />
                                </div>
                            </section>
                            {(selectedStudent.dietary || selectedStudent.allergies) && (
                                <section>
                                    <h3 className="text-[11px] font-black text-rose-600 uppercase tracking-widest mb-3 flex items-center gap-2"><span className="w-2 h-2 bg-rose-500 rounded-full"></span> Health</h3>
                                    <div className="bg-rose-50 border border-rose-100 p-4 rounded-2xl shadow-sm">
                                        <InfoBlock label="Allergies" value={selectedStudent.allergies} icon="alert-triangle" color="text-rose-700" />
                                        <InfoBlock label="Dietary" value={selectedStudent.dietary} icon="heart" color="text-rose-700" />
                                    </div>
                                </section>
                            )}
                            <section>
                                <h3 className="text-[11px] font-black text-slate-900 uppercase tracking-widest mb-3 flex items-center gap-2"><span className="w-2 h-2 bg-emerald-500 rounded-full"></span> Emergency</h3>
                                <div className="bg-emerald-50/50 border border-emerald-100 p-4 rounded-2xl shadow-sm">
                                    <InfoBlock label="Guardian" value={selectedStudent.emergency.name} icon="user" />
                                    <InfoBlock label="Phone" value={selectedStudent.emergency.phone} icon="phone" />
                                    <InfoBlock label="Email" value={selectedStudent.emergency.email} icon="mail" />
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            if (selectedCabin) {
                return (
                    <div className="min-h-screen bg-slate-50 pb-20 animate-fade-in">
                        <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                            <button onClick={() => setSelectedCabin(null)} className="p-2 -ml-2 active:bg-slate-800 rounded-full transition-colors"><Icon name="chevron-left" /></button>
                            <h1 className="text-lg font-bold">Cabin {selectedCabin.name}</h1>
                        </header>
                        <main className="max-w-2xl mx-auto p-4 space-y-2">
                            {selectedCabin.students.map(s => (
                                <button key={s.uid} onClick={() => setSelectedStudent(s)} className="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between w-full shadow-sm active:scale-95 transition-all text-left">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-slate-50 overflow-hidden border border-slate-100 flex items-center justify-center">
                                            {s.photoUrl ? <img src={getDirectDriveUrl(s.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={20} />}
                                        </div>
                                        <div className="font-bold text-slate-900 leading-tight">{s.displayName}</div>
                                    </div>
                                    <Icon name="chevron-right" size={18} className="text-slate-300 mr-2" />
                                </button>
                            ))}
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 pb-24">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-lg">
                        <div>
                            <h1 className="text-xl font-black italic tracking-tighter">DIAC HUB</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{refreshing ? 'Syncing...' : `${processedStudents.length} Students`}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className="p-2 bg-slate-800 rounded-xl active:scale-90 transition-all"><Icon name="refresh-cw" size={18} className={refreshing ? 'animate-spin' : ''}/></button>
                            <button onClick={handleLogout} className="p-2 bg-slate-800 rounded-xl text-rose-400 active:scale-90 transition-all"><Icon name="log-out" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-4">
                        <nav className="flex gap-2 mb-2">
                            {['students', 'cabins', 'schedule'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ${activeTab === tab ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                    {tab}
                                </button>
                            ))}
                        </nav>
                        
                        {activeTab === 'students' && (
                            <>
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input 
                                        type="text" 
                                        placeholder="Search name, cabin, school..." 
                                        className="w-full bg-white border border-slate-200 py-4 pl-12 pr-4 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm font-medium"
                                        value={searchQuery} 
                                        onChange={e => setSearchQuery(e.target.value)} 
                                    />
                                </div>
                                <div className="grid gap-2">
                                    {filteredStudents.map(s => (
                                        <button key={s.uid} onClick={() => setSelectedStudent(s)} className="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between w-full shadow-sm active:scale-95 transition-all text-left">
                                            <div className="flex items-center gap-4">
                                                <div className="w-14 h-14 rounded-2xl bg-slate-50 overflow-hidden border border-slate-100 flex items-center justify-center">
                                                    {s.photoUrl ? <img src={getDirectDriveUrl(s.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={24} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-900 leading-tight">{s.displayName}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Cabin {s.cabin} • {s.school || 'DDSB'}</div>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={18} className="text-slate-300 mr-2" />
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}

                        {activeTab === 'cabins' && (
                            <div className="grid gap-4 animate-fade-in">
                                {cabins.map(cabin => (
                                    <button key={cabin.name} onClick={() => setSelectedCabin(cabin)} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between w-full active:scale-95 transition-all text-left group">
                                        <div className="flex items-center gap-5">
                                            <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-black text-lg group-active:bg-indigo-600 group-active:text-white transition-colors">{cabin.name.charAt(0)}</div>
                                            <div>
                                                <h3 className="font-bold text-slate-900 text-lg">Cabin {cabin.name}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{cabin.count} Students</p>
                                            </div>
                                        </div>
                                        <Icon name="chevron-right" className="text-slate-300" />
                                    </button>
                                ))}
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden animate-fade-in">
                                {schedule.length > 0 ? schedule.map((item, i) => (
                                    <div key={i} className="p-5 flex gap-5 border-b border-slate-50 last:border-0">
                                        <div className="text-indigo-600 font-black text-xs min-w-[80px] pt-1 uppercase tracking-tighter">{item.time}</div>
                                        <div>
                                            <div className="font-bold text-slate-900 text-base">{item.event}</div>
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center gap-1"><Icon name="map-pin" size={10} /> {item.location}</div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="p-10 text-center text-slate-400 text-sm font-bold uppercase tracking-widest">No Schedule Data</div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
