<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Gaegu:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; margin: 0; }
        .whimsical-font { font-family: 'Gaegu', cursive; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UPDATED SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJrg71PZtTulEUcmw9mQtJgw0aowniwDRN4F0ENIRrnw1ayNFA8XmBsoitChEYvQCu/exec";
        const APP_LOGO_URL = "https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png";

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const s = String(url);
            if (s.includes('drive.google.com')) {
                let id = s.includes('id=') ? s.split('id=')[1].split('&')[0] : s.split('/file/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}=s400`;
            }
            return s;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [currentUser, setCurrentUser] = useState('');
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const [activeTab, setActiveTab] = useState('students');
            const [searchQuery, setSearchQuery] = useState('');
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [classes, setClasses] = useState({ S1: [], S2: [], S3: [], S4: [] });
            const [absences, setAbsences] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [refreshing, setRefreshing] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);

            const [attSession, setAttSession] = useState('1');
            const [attActivity, setAttActivity] = useState('');

            useEffect(() => {
                const user = localStorage.getItem('diac_user');
                const hoc = localStorage.getItem('diac_hoc');
                if (user) {
                    setIsAuthenticated(true);
                    setCurrentUser(user);
                    setIsHoc(hoc === 'true');
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const endpoints = ['students', 'schedule', 'classes', 'absences'];
                    const results = await Promise.all(
                        endpoints.map(ep => fetch(`${SCRIPT_URL}?action=${ep}`).then(r => r.json()).catch(() => null))
                    );

                    setStudents(results[0] || []);
                    setSchedule(results[1] || []);
                    setClasses(results[2] || { S1: [], S2: [], S3: [], S4: [] });
                    setAbsences(results[3] || []);
                    setLastUpdated(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                } catch (e) {
                    console.error("Sync failed", e);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(loginData.user)}&pass=${encodeURIComponent(loginData.pass)}`);
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('diac_user', loginData.user.toLowerCase());
                        localStorage.setItem('diac_hoc', String(data.isHoc));
                        setIsAuthenticated(true);
                        setCurrentUser(loginData.user.toLowerCase());
                        setIsHoc(data.isHoc);
                        fetchData();
                    } else {
                        setLoginError(data.error || "Login Failed");
                    }
                } catch (e) {
                    setLoginError("Connection Error");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const reportAbsence = async (student, status) => {
                const payload = {
                    action: 'reportAbsence',
                    id: Date.now(),
                    studentId: student.stuNum,
                    studentName: student.displayName,
                    cabin: student.cabin,
                    session: attSession,
                    activity: attActivity,
                    reportedBy: currentUser,
                    status: status 
                };
                try {
                    setRefreshing(true);
                    // Use mode: 'no-cors' to prevent the Failed to Fetch error common with Apps Script POSTs
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload) 
                    });
                    // Since no-cors doesn't allow reading response, we wait a moment then refresh
                    setTimeout(fetchData, 1200);
                } catch (e) { 
                    console.error("Attendance submission failed", e);
                    setRefreshing(false);
                }
            };

            const processedStudents = useMemo(() => {
                return students.map(s => {
                    const name = s.preferredName ? String(s.preferredName).trim() : `${s.firstName} ${s.lastName}`;
                    return {
                        ...s,
                        displayName: name,
                        sessions: [
                            { name: s.s1, venue: s.v1 },
                            { name: s.s2, venue: s.v2 },
                            { name: s.s3, venue: s.v3 },
                            { name: s.s4, venue: s.v4 }
                        ]
                    };
                }).sort((a, b) => {
                    const lastA = a.lastName ? String(a.lastName).toLowerCase() : "";
                    const lastB = b.lastName ? String(b.lastName).toLowerCase() : "";
                    if (lastA < lastB) return -1;
                    if (lastA > lastB) return 1;
                    const firstA = a.firstName ? String(a.firstName).toLowerCase() : "";
                    const firstB = b.firstName ? String(b.firstName).toLowerCase() : "";
                    return firstA.localeCompare(firstB);
                });
            }, [students]);

            const attendanceList = useMemo(() => {
                if (!attActivity) return [];
                const idx = parseInt(attSession) - 1;
                return processedStudents.filter(s => s.sessions[idx]?.name === attActivity).map(s => {
                    const report = [...absences].reverse().find(a => a.studentName === s.displayName && String(a.session) === String(attSession));
                    return { ...s, status: report ? report.status : 'Present' };
                });
            }, [processedStudents, attSession, attActivity, absences]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                    <p className="whimsical-font text-slate-400 font-bold uppercase text-[10px] tracking-widest">Syncing Hub...</p>
                </div>
            );

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <form onSubmit={handleLogin} className="w-full max-w-sm space-y-6 animate-fade-in">
                        <div className="text-center">
                            <img src={APP_LOGO_URL} className="w-20 mx-auto mb-4" />
                            <h1 className="text-3xl font-black text-indigo-600 whimsical-font italic uppercase">DIAC HUB</h1>
                        </div>
                        <div className="space-y-3">
                            <input type="text" placeholder="Username" required className="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                            <input type="password" placeholder="Password" required className="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                        </div>
                        {loginError && <p className="text-rose-500 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl">{loginError}</p>}
                        <button disabled={isLoggingIn} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase">
                            {isLoggingIn ? 'Signing In...' : 'Sign In'}
                        </button>
                    </form>
                </div>
            );

            if (selectedStudent) return (
                <div className="min-h-screen bg-slate-50 animate-fade-in pb-12">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                        <button onClick={() => setSelectedStudent(null)} className="p-2"><Icon name="arrow-left" /></button>
                        <h1 className="text-lg font-bold truncate whimsical-font">{selectedStudent.displayName}</h1>
                    </header>
                    <div className="p-6 space-y-4 max-w-xl mx-auto">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 text-center space-y-4">
                            <div className="w-24 h-24 rounded-3xl overflow-hidden shadow-inner mx-auto bg-slate-100 flex items-center justify-center">
                                {selectedStudent.photo ? <img src={getDirectDriveUrl(selectedStudent.photo)} className="w-full h-full object-cover" /> : <Icon name="user" size={32} className="text-slate-300" />}
                            </div>
                            <div>
                                <h2 className="text-2xl font-black text-slate-800">{selectedStudent.displayName}</h2>
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Cabin {selectedStudent.cabin} • {selectedStudent.school}</p>
                            </div>
                        </div>

                        {(selectedStudent.dietary || selectedStudent.allergies) && (
                            <div className="bg-rose-50 p-5 rounded-3xl border border-rose-100">
                                <p className="text-[9px] font-black text-rose-500 uppercase tracking-widest mb-1">Medical / Dietary</p>
                                <p className="text-sm font-bold text-rose-700">{selectedStudent.dietary} {selectedStudent.allergies}</p>
                            </div>
                        )}

                        <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-200">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calendar" size={14}/> Schedule</h3>
                            <div className="space-y-2">
                                {selectedStudent.sessions.map((s, i) => (
                                    <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl">
                                        <div>
                                            <p className="text-[8px] font-black text-indigo-400 uppercase">Session {i+1}</p>
                                            <p className="text-sm font-bold text-slate-700">{s.name || "Open Studio"}</p>
                                        </div>
                                        <p className="text-[10px] font-bold text-slate-400">{s.venue || "TBD"}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-24">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-black whimsical-font italic">DIAC HUB</h1>
                            <p className="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Updated {lastUpdated}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className={`p-2 bg-slate-800 rounded-xl ${refreshing ? 'animate-spin' : ''}`}><Icon name="refresh-cw" size={18}/></button>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="p-2 bg-slate-800 rounded-xl text-rose-400"><Icon name="log-out" size={18}/></button>
                        </div>
                    </header>

                    <main className="p-4 max-w-xl mx-auto space-y-4">
                        <nav className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto no-scrollbar">
                            <button onClick={() => setActiveTab('students')} className={`flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'students' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Artists</button>
                            <button onClick={() => setActiveTab('attendance')} className={`flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'attendance' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Attendance</button>
                            <button onClick={() => setActiveTab('schedule')} className={`flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'schedule' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Schedule</button>
                            {isHoc && (
                                <button onClick={() => setActiveTab('hoc')} className={`flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'hoc' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>HOC</button>
                            )}
                        </nav>

                        {activeTab === 'students' && (
                            <div className="space-y-3 animate-fade-in">
                                <input type="text" placeholder="Search artists..." className="w-full bg-white border border-slate-200 p-4 rounded-3xl shadow-sm outline-none font-medium" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                <div className="grid gap-2">
                                    {processedStudents.filter(s => s.displayName.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                        <button key={s.stuNum} onClick={() => setSelectedStudent(s)} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between w-full shadow-sm text-left">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden border border-slate-100">
                                                    {s.photo ? <img src={getDirectDriveUrl(s.photo)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={16} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-900">{s.displayName}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase">Cabin {s.cabin}</div>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={16} className="text-slate-200" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'attendance' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-2">Session</label>
                                        <select value={attSession} onChange={e => { setAttSession(e.target.value); setAttActivity(''); }} className="w-full bg-slate-50 p-4 rounded-2xl font-bold mt-1">
                                            <option value="1">Session 1</option>
                                            <option value="2">Session 2</option>
                                            <option value="3">Session 3</option>
                                            <option value="4">Session 4</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-2">Activity</label>
                                        <select value={attActivity} onChange={e => setAttActivity(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl font-bold mt-1">
                                            <option value="">Choose...</option>
                                            {(classes[`S${attSession}`] || []).map((cls, i) => <option key={i} value={cls}>{cls}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {attActivity && (
                                    <div className="grid gap-2">
                                        {attendanceList.map(s => (
                                            <div key={s.stuNum} className="bg-white p-4 rounded-2xl border border-slate-200 flex items-center justify-between">
                                                <div className="flex-1" onClick={() => setSelectedStudent(s)}>
                                                    <div className="font-bold text-slate-900">{s.displayName}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase">Cabin {s.cabin} • {s.status}</div>
                                                </div>
                                                <button 
                                                    onClick={() => reportAbsence(s, s.status === 'Present' ? 'Absent' : 'Present')}
                                                    className={`px-4 py-2 text-[10px] font-black rounded-xl uppercase active:scale-95 transition-all ${s.status === 'Present' ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}
                                                >
                                                    {s.status === 'Present' ? 'Absent' : 'Mark Present'}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-[2rem] shadow-sm overflow-hidden animate-fade-in border border-slate-200">
                                {schedule.map((item, i) => (
                                    <div key={i} className="p-5 flex gap-5 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors">
                                        <div className="text-indigo-600 font-black text-sm min-w-[80px] text-right">{item.time}</div>
                                        <div>
                                            <div className="font-bold text-slate-900 text-sm leading-tight">{item.event}</div>
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center gap-1">
                                                <Icon name="map-pin" size={10} /> {item.location}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {schedule.length === 0 && <p className="text-center py-12 text-slate-400 text-xs font-bold italic">Schedule not found.</p>}
                            </div>
                        )}

                        {activeTab === 'hoc' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-xl">
                                    <h2 className="whimsical-font text-3xl font-black italic">HOC COMMAND</h2>
                                    <p className="text-xs font-bold opacity-80 mt-1 uppercase tracking-widest">Head of Cabin Control Center</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="text-indigo-600 mb-2"><Icon name="users" /></div>
                                        <div className="text-2xl font-black text-slate-800">{students.length}</div>
                                        <div className="text-[9px] font-black text-slate-400 uppercase">Total Students</div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="text-rose-600 mb-2"><Icon name="alert-circle" /></div>
                                        <div className="text-2xl font-black text-slate-800">{absences.length}</div>
                                        <div className="text-[9px] font-black text-slate-400 uppercase">Reports Today</div>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Latest Absence Reports</h3>
                                    <div className="space-y-3">
                                        {absences.length > 0 ? [...absences].reverse().slice(0, 10).map((a, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl text-xs">
                                                <div>
                                                    <span className="font-bold text-slate-800">{a.studentName}</span>
                                                    <p className="text-[9px] text-slate-400 font-bold">Session {a.session} • {a.activity}</p>
                                                </div>
                                                <div className="text-[9px] font-black text-rose-500 bg-rose-50 px-2 py-1 rounded-lg uppercase">{a.status}</div>
                                            </div>
                                        )) : (
                                            <p className="text-center py-8 text-slate-400 text-xs font-bold italic">No reports yet today</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
