<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Gaegu:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc; 
            margin: 0; 
            overflow-x: hidden;
        }

        .whimsical-font { font-family: 'Gaegu', cursive; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; appearance: none; }

        .paint-splotch {
            position: fixed;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.12;
            pointer-events: none;
        }
        .splotch-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: #6366f1; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        .splotch-2 { top: 40%; right: -15%; width: 50vw; height: 50vw; background: #ec4899; border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; }
    </style>
</head>
<body>
    <div class="paint-splotch splotch-1"></div>
    <div class="paint-splotch splotch-2"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UPDATED WEB APP URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLa9VEQWwPR_yTU50r09f-X_PHMyOxFV4cOqyuZvLOuu861OiTfwrsp8a6Z6RnYOre/exec";
        const APP_LOGO_URL = "https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png";
        const PAGE_SIZE = 100;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const s = String(url);
            if (s.includes('drive.google.com')) {
                let id = "";
                if (s.includes('id=')) { id = s.split('id=')[1].split('&')[0]; } 
                else if (s.includes('/file/d/')) { id = s.split('/file/d/')[1].split('/')[0]; }
                return id ? `https://lh3.googleusercontent.com/d/${id}=s400` : s;
            }
            return s;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [currentUser, setCurrentUser] = useState('');
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const [activeTab, setActiveTab] = useState('students');
            const [searchQuery, setSearchQuery] = useState('');
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [absences, setAbsences] = useState([]); 
            const [classes, setClasses] = useState({ S1: [], S2: [], S3: [], S4: [] });
            const [attStudents, setAttStudents] = useState([]);
            
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [refreshing, setRefreshing] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);

            const [attSession, setAttSession] = useState('1');
            const [attActivity, setAttActivity] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            
            const [localAttendance, setLocalAttendance] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [hocSyncingId, setHocSyncingId] = useState(null);

            useEffect(() => {
                const user = localStorage.getItem('diac_user');
                const hoc = localStorage.getItem('diac_hoc');
                if (user) {
                    setIsAuthenticated(true);
                    setCurrentUser(user);
                    setIsHoc(hoc === 'true');
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const endpoints = ['students', 'schedule', 'absences', 'classes', 'attStudents'];
                    const results = await Promise.all(
                        endpoints.map(ep => 
                            fetch(`${SCRIPT_URL}?action=${ep}`)
                            .then(r => r.json())
                            .catch(() => null)
                        )
                    );
                    
                    if (results[0]) setStudents(results[0]);
                    if (results[1]) setSchedule(results[1]);
                    if (results[2]) {
                        setAbsences(results[2]);
                        const initialLocal = {};
                        const today = new Date().toDateString();
                        results[2].forEach(abs => {
                            const absDate = new Date(abs.timestamp).toDateString();
                            if (absDate === today) {
                                initialLocal[`${abs.studentName}-${abs.session}-${abs.activity}`] = abs.status;
                            }
                        });
                        setLocalAttendance(prev => ({...prev, ...initialLocal}));
                    }
                    if (results[3]) setClasses(results[3]);
                    if (results[4]) setAttStudents(results[4]);
                    
                    setLastUpdated(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                } catch (e) { console.error(e); } 
                finally { setLoading(false); setRefreshing(false); setHocSyncingId(null); }
            };

            const stageStatusChange = (studentName, newStatus) => {
                const key = `${studentName}-${attSession}-${attActivity}`;
                setLocalAttendance(prev => ({ ...prev, [key]: newStatus }));
            };

            const handleHocUpdate = async (studentName, currentAbsence, newStatus) => {
                try {
                    setHocSyncingId(currentAbsence.id);
                    await fetch(`${SCRIPT_URL}?action=updateAbsence&id=${encodeURIComponent(currentAbsence.id)}&status=${encodeURIComponent(newStatus)}`, { mode: 'no-cors' });
                    
                    const key = `${studentName}-${currentAbsence.session}-${currentAbsence.activity}`;
                    setLocalAttendance(prev => ({...prev, [key]: newStatus}));
                    setTimeout(fetchData, 1000);
                } catch (e) { 
                    setHocSyncingId(null);
                }
            };

            const handleSubmitAttendance = async () => {
                setIsSubmitting(true);
                const updates = [];
                const today = new Date().toDateString();
                
                enrolledInCurrent.forEach(s => {
                    const name = s.displayName;
                    const key = `${name}-${attSession}-${attActivity}`;
                    const status = localAttendance[key] || 'Not Completed';
                    
                    const existing = absences.find(a => {
                        const absDate = new Date(a.timestamp).toDateString();
                        return a.studentName === name && 
                               String(a.session) === String(attSession) && 
                               a.activity === attActivity &&
                               absDate === today;
                    });

                    if (status !== 'Not Completed' || existing) {
                        const studentData = students.find(st => st.preferredName === name);
                        updates.push({
                            id: existing ? existing.id : null,
                            studentId: studentData ? studentData.stuNum : '000',
                            studentName: name,
                            cabin: studentData ? studentData.cabin : 'Unknown',
                            session: attSession,
                            activity: attActivity,
                            status: status,
                            reportedBy: currentUser
                        });
                    }
                });

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            action: 'bulkReport',
                            data: JSON.stringify(updates)
                        })
                    });
                    setTimeout(fetchData, 1500);
                } catch (e) {
                    console.error("Submit failed", e);
                    setIsSubmitting(false);
                }
            };

            const sortedArtists = useMemo(() => {
                if (!Array.isArray(students)) return [];
                return [...students].sort((a, b) => {
                    const lastA = String(a.lastName || "").toLowerCase();
                    const lastB = String(b.lastName || "").toLowerCase();
                    if (lastA !== lastB) return lastA.localeCompare(lastB);
                    return String(a.firstName || "").toLowerCase().localeCompare(String(b.firstName || "").toLowerCase());
                });
            }, [students]);

            const filteredStudents = useMemo(() => {
                const query = searchQuery.toLowerCase().trim();
                return sortedArtists.filter(s => 
                    String(s.preferredName || "").toLowerCase().includes(query) || 
                    String(s.firstName || "").toLowerCase().includes(query) || 
                    String(s.lastName || "").toLowerCase().includes(query)
                );
            }, [sortedArtists, searchQuery]);

            const totalPages = Math.max(1, Math.ceil(filteredStudents.length / PAGE_SIZE));
            const pagedStudents = useMemo(() => {
                const start = (currentPage - 1) * PAGE_SIZE;
                return filteredStudents.slice(start, start + PAGE_SIZE);
            }, [filteredStudents, currentPage]);

            const enrolledInCurrent = useMemo(() => {
                if (!attActivity || !Array.isArray(attStudents)) return [];
                const sessKey = `S${attSession}`;
                return attStudents.filter(s => s[sessKey] === attActivity);
            }, [attStudents, attActivity, attSession]);

            const hasUnsavedChanges = useMemo(() => {
                const today = new Date().toDateString();
                return enrolledInCurrent.some(s => {
                    const name = s.displayName;
                    const key = `${name}-${attSession}-${attActivity}`;
                    const localStatus = localAttendance[key] || 'Not Completed';
                    const serverAbsence = absences.find(a => 
                        a.studentName === name && 
                        String(a.session) === String(attSession) && 
                        a.activity === attActivity &&
                        new Date(a.timestamp).toDateString() === today
                    );
                    const serverStatus = serverAbsence ? serverAbsence.status : 'Not Completed';
                    return localStatus !== serverStatus;
                });
            }, [enrolledInCurrent, localAttendance, absences, attSession, attActivity]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setLoginError('');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(loginData.user)}&pass=${encodeURIComponent(loginData.pass)}`);
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('diac_user', loginData.user.toLowerCase());
                        localStorage.setItem('diac_hoc', String(data.isHoc));
                        setIsAuthenticated(true);
                        setCurrentUser(loginData.user.toLowerCase());
                        setIsHoc(data.isHoc);
                        fetchData();
                    } else { setLoginError(data.error || "Login Failed"); }
                } catch (e) { setLoginError("Connection Error"); }
                finally { setIsLoggingIn(false); }
            };

            const DetailRow = ({ label, value, icon }) => (
                <div className="flex items-start gap-4 p-4 bg-white/70 backdrop-blur-sm rounded-2xl border border-white shadow-sm">
                    <div className="p-2 bg-indigo-50 text-indigo-600 rounded-xl shrink-0"><Icon name={icon} size={18} /></div>
                    <div>
                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{label}</div>
                        <div className="text-sm font-bold text-slate-900">{value || 'N/A'}</div>
                    </div>
                </div>
            );

            const Pagination = ({ pos }) => (
                <div className={`flex items-center justify-between bg-white px-4 py-3 rounded-2xl border border-slate-200 shadow-sm ${pos === 'top' ? 'mb-4' : 'mt-4'}`}>
                    <button disabled={currentPage === 1} onClick={() => {setCurrentPage(p => p - 1); window.scrollTo(0,0);}} className="p-2 disabled:opacity-20 text-indigo-600"><Icon name="chevron-left" /></button>
                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Page {currentPage} / {totalPages}</span>
                    <button disabled={currentPage >= totalPages} onClick={() => {setCurrentPage(p => p + 1); window.scrollTo(0,0);}} className="p-2 disabled:opacity-20 text-indigo-600"><Icon name="chevron-right" /></button>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                    <p className="whimsical-font text-slate-400 font-bold uppercase text-[10px] tracking-widest">DIAC HUB LOADING...</p>
                </div>
            );

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <form onSubmit={handleLogin} className="w-full max-w-sm space-y-6 animate-fade-in relative z-10">
                        <div className="text-center">
                            <img src={APP_LOGO_URL} className="w-20 mx-auto mb-4" />
                            <h1 className="text-3xl font-black text-indigo-600 whimsical-font italic uppercase text-center">DIAC HUB</h1>
                        </div>
                        <div className="space-y-3">
                            <input type="text" placeholder="Username" required className="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500 shadow-sm" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                            <input type="password" placeholder="Password" required className="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500 shadow-sm" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            {loginError && <p className="text-rose-500 text-xs font-bold text-center px-2">{loginError}</p>}
                        </div>
                        <button disabled={isLoggingIn} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase">{isLoggingIn ? 'Verifying...' : 'Sign In'}</button>
                    </form>
                </div>
            );

            if (selectedStudent) return (
                <div className="min-h-screen bg-transparent animate-fade-in pb-12">
                    <header className="bg-slate-900/90 backdrop-blur-md text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                        <button onClick={() => setSelectedStudent(null)} className="p-2"><Icon name="arrow-left" /></button>
                        <h1 className="text-lg font-bold truncate whimsical-font">{selectedStudent.preferredName}</h1>
                    </header>
                    <div className="p-4 max-w-2xl mx-auto space-y-4">
                        <div className="bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] shadow-sm border border-white text-center">
                            <div className="w-28 h-28 rounded-[2rem] overflow-hidden shadow-inner mx-auto bg-slate-100 flex items-center justify-center border-4 border-white mb-4">
                                {selectedStudent.photo ? <img src={getDirectDriveUrl(selectedStudent.photo)} className="w-full h-full object-cover" /> : <Icon name="user" size={40} className="text-slate-300" />}
                            </div>
                            <h2 className="text-2xl font-black text-slate-800 leading-tight">{selectedStudent.preferredName}</h2>
                            <div className="flex flex-wrap justify-center gap-2 mt-3">
                                <span className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase">{selectedStudent.pronouns}</span>
                                <span className="px-3 py-1 bg-slate-900 text-white rounded-full text-[10px] font-black uppercase">{selectedStudent.cabin}</span>
                                <span className="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[10px] font-black uppercase">{selectedStudent.grade}</span>
                            </div>
                        </div>

                        <div className="grid gap-3">
                            <DetailRow label="School" value={selectedStudent.school} icon="school" />
                            <DetailRow label="Birth Date" value={selectedStudent.birthDate} icon="calendar" />
                            <DetailRow label="Dietary Restrictions" value={selectedStudent.dietary} icon="utensils" />
                            <DetailRow label="Allergies" value={selectedStudent.allergies} icon="alert-circle" />
                            <div className="px-4 py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Guardian Contact</div>
                            <DetailRow label="Guardian" value={`${selectedStudent.guardianFirstName} ${selectedStudent.guardianLastName}`} icon="users" />
                            <DetailRow label="Phone" value={selectedStudent.guardianPhone} icon="phone" />
                            <DetailRow label="Guardian Email" value={selectedStudent.guardianEmail} icon="mail" />
                            <DetailRow label="Preferred Email" value={selectedStudent.preferredEmail} icon="at-sign" />
                            <div className="px-4 py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Activity Schedule</div>
                            <DetailRow label="Session 1" value={`${selectedStudent.s1Activity} @ ${selectedStudent.s1Venue}`} icon="star" />
                            <DetailRow label="Session 2" value={`${selectedStudent.s2Activity} @ ${selectedStudent.s2Venue}`} icon="star" />
                            <DetailRow label="Session 3" value={`${selectedStudent.s3Activity} @ ${selectedStudent.s3Venue}`} icon="star" />
                            <DetailRow label="Session 4" value={`${selectedStudent.s4Activity} @ ${selectedStudent.s4Venue}`} icon="star" />
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-transparent pb-24">
                    <header className="bg-slate-900/90 backdrop-blur-md text-white p-5 sticky top-0 z-50 flex justify-between items-center">
                        <h1 className="text-xl font-black whimsical-font italic tracking-tighter">DIAC HUB</h1>
                        <button onClick={fetchData} className={`p-2 bg-slate-800 rounded-xl ${refreshing ? 'animate-spin' : ''}`}><Icon name="refresh-cw" size={18}/></button>
                    </header>

                    <main className="p-4 max-w-xl mx-auto space-y-4">
                        <nav className="flex bg-white/70 backdrop-blur-md p-1 rounded-2xl shadow-sm border border-white overflow-x-auto no-scrollbar">
                            {['students', 'attendance', 'hoc', 'schedule'].map(tab => (
                                (tab !== 'hoc' || isHoc) && 
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 min-w-[90px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>
                                    {tab === 'students' ? 'Artists' : tab}
                                </button>
                            ))}
                        </nav>

                        {activeTab === 'students' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                    <input type="text" placeholder="Search Artists..." className="w-full bg-white/70 backdrop-blur-sm border border-white p-4 pl-12 rounded-3xl shadow-sm outline-none font-medium text-sm" value={searchQuery} onChange={e => {setSearchQuery(e.target.value); setCurrentPage(1);}} />
                                </div>
                                <Pagination pos="top" />
                                <div className="grid gap-2">
                                    {pagedStudents.map((s, idx) => (
                                        <button key={idx} onClick={() => setSelectedStudent(s)} className="bg-white/60 backdrop-blur-sm p-4 rounded-2xl border border-white flex items-center justify-between w-full shadow-sm text-left">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center border border-slate-100 overflow-hidden shadow-sm">
                                                    {s.photo ? <img src={getDirectDriveUrl(s.photo)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={20} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-900 text-sm leading-tight">{s.preferredName}</div>
                                                    <div className="text-[9px] text-slate-400 font-bold uppercase mt-0.5">{s.cabin}</div>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={16} className="text-slate-200" />
                                        </button>
                                    ))}
                                </div>
                                <Pagination pos="bottom" />
                            </div>
                        )}

                        {activeTab === 'attendance' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white/70 backdrop-blur-md p-6 rounded-[2rem] border border-white shadow-sm space-y-4">
                                    <div className="flex gap-2">
                                        {[1, 2, 3, 4].map(num => (
                                            <button key={num} onClick={() => {setAttSession(num.toString()); setAttActivity('');}} className={`flex-1 py-3 rounded-xl text-[10px] font-black border transition-all ${attSession === num.toString() ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>S{num}</button>
                                        ))}
                                    </div>
                                    <div className="relative">
                                        <select className="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-sm outline-none font-bold text-slate-600" value={attActivity} onChange={e => setAttActivity(e.target.value)}>
                                            <option value="">Choose Activity</option>
                                            {(classes[`S${attSession}`] || []).map((c, i) => <option key={i} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {attActivity && (
                                    <div className="space-y-4">
                                        <button 
                                            disabled={isSubmitting || !hasUnsavedChanges}
                                            onClick={handleSubmitAttendance}
                                            className={`w-full font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 sticky top-24 z-40 animate-fade-in ${hasUnsavedChanges ? 'bg-emerald-600 text-white' : 'bg-slate-200 text-slate-400 opacity-50'}`}
                                        >
                                            <Icon name={isSubmitting ? "loader" : "save"} className={isSubmitting ? "animate-spin" : ""} />
                                            {isSubmitting ? 'SYNCING...' : 'SUBMIT ATTENDANCE'}
                                        </button>

                                        <div className="space-y-2">
                                            {enrolledInCurrent.map((s, i) => {
                                                const name = s.displayName;
                                                const key = `${name}-${attSession}-${attActivity}`;
                                                const currentStatus = localAttendance[key] || 'Not Completed';
                                                
                                                const today = new Date().toDateString();
                                                const serverAbsence = absences.find(a => 
                                                    a.studentName === name && 
                                                    String(a.session) === String(attSession) && 
                                                    a.activity === attActivity &&
                                                    new Date(a.timestamp).toDateString() === today
                                                );
                                                const serverStatus = serverAbsence ? serverAbsence.status : 'Not Completed';
                                                const isSyncing = isSubmitting && currentStatus !== serverStatus;

                                                return (
                                                    <div key={i} className={`bg-white/60 backdrop-blur-sm p-4 rounded-2xl border flex items-center justify-between shadow-sm transition-all ${currentStatus === 'Not Completed' ? 'border-amber-100' : 'border-slate-100'}`}>
                                                        <div className="font-bold text-slate-800 text-sm">{name}</div>
                                                        <div className="relative">
                                                            {isSyncing ? (
                                                                <div className="text-[10px] font-black uppercase px-4 py-2 rounded-xl bg-slate-100 text-slate-400 animate-pulse">Syncing...</div>
                                                            ) : (
                                                                <select 
                                                                    className={`text-[10px] font-black uppercase px-4 py-2 rounded-xl border appearance-none ${
                                                                        currentStatus === 'Not Completed' ? 'bg-amber-100 border-amber-200 text-amber-700' : 
                                                                        currentStatus === 'Present' ? 'bg-emerald-500 border-emerald-500 text-white' : 
                                                                        'bg-rose-500 border-rose-500 text-white'
                                                                    }`}
                                                                    value={currentStatus} 
                                                                    onChange={e => stageStatusChange(name, e.target.value)}
                                                                >
                                                                    <option value="Not Completed">Not Completed</option>
                                                                    <option value="Present">Present</option>
                                                                    <option value="Absent - Unknown">Absent - Unknown</option>
                                                                    <option value="Absent - Excused">Absent - Excused</option>
                                                                    <option value="Late">Late</option>
                                                                </select>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'hoc' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-rose-600 uppercase tracking-widest px-2 border-l-4 border-rose-500">Urgent: Missing Student</h3>
                                    {absences.filter(a => a.status === 'Absent - Unknown' && new Date(a.timestamp).toDateString() === new Date().toDateString()).map(a => (
                                        <div key={a.id} className="bg-white/80 backdrop-blur-md p-5 rounded-[2rem] border border-rose-100 shadow-sm">
                                            <div className="mb-4">
                                                <p className="font-black text-slate-800 text-base">{a.studentName}</p>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Cabin: {a.cabin} • Sess {a.session}</p>
                                                <p className="text-[10px] font-bold text-indigo-500 uppercase">{a.activity}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                {hocSyncingId === a.id ? (
                                                    <div className="w-full py-3 rounded-xl text-[10px] font-black uppercase text-center bg-slate-100 text-slate-400 animate-pulse">Syncing...</div>
                                                ) : (
                                                    <>
                                                        <button onClick={() => handleHocUpdate(a.studentName, a, 'Present')} className="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-slate-900 text-white">Present</button>
                                                        <button onClick={() => handleHocUpdate(a.studentName, a, 'Absent - Excused')} className="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-slate-900 text-white">Excused</button>
                                                        <button onClick={() => handleHocUpdate(a.studentName, a, 'Late')} className="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-slate-900 text-white">Late</button>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-amber-600 uppercase tracking-widest px-2 border-l-4 border-amber-500">Not Completed List</h3>
                                    <div className="grid gap-2">
                                        {attStudents.filter(stu => {
                                            const today = new Date().toDateString();
                                            return !absences.some(a => a.studentName === stu.displayName && String(a.session) === String(attSession) && new Date(a.timestamp).toDateString() === today);
                                        }).slice(0, 50).map((stu, i) => (
                                            <div key={i} className="bg-white/60 backdrop-blur-sm p-4 rounded-2xl border border-amber-100 flex items-center justify-between shadow-sm">
                                                <div className="text-sm font-bold text-slate-700">{stu.displayName}</div>
                                                <div className="text-[9px] font-black text-amber-500 uppercase">{stu[`S${attSession}`]}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="overflow-hidden rounded-3xl border border-white shadow-sm">
                                    <table className="w-full bg-white/70 backdrop-blur-md text-left">
                                        <thead className="bg-slate-900 text-white">
                                            <tr>
                                                <th className="p-4 text-[10px] font-black uppercase">Time</th>
                                                <th className="p-4 text-[10px] font-black uppercase">Activity</th>
                                                <th className="p-4 text-[10px] font-black uppercase">Location</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {schedule.map((item, i) => (
                                                <tr key={i}>
                                                    <td className="p-4 text-xs font-bold text-slate-900 whitespace-nowrap">{item["Time:"]}</td>
                                                    <td className="p-4 text-xs font-medium text-slate-800">{item["Activity:"]}</td>
                                                    <td className="p-4 text-xs text-slate-500 italic">{item["Location:"]}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-xl z-[60]">
                        <div className="bg-slate-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl flex items-center justify-center gap-3 border border-white/10">
                            <span className="text-[10px] font-black uppercase tracking-widest">{currentUser}</span>
                            <div className="w-[1px] h-3 bg-slate-700"></div>
                            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-[10px] font-black text-rose-400 uppercase tracking-widest">Logout</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
