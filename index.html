<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;950&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-shadow {
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        .scroll-hide::-webkit-scrollbar {
            display: none;
        }
        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuration
        const GOOGLE_CLIENT_ID = "241712157669-1huukafbcpsifc4v35op6o80qjb10r0r.apps.googleusercontent.com"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbyLa9VEQWwPR_yTU50r09f-X_PHMyOxFV4cOqyuZvLOuu861OiTfwrsp8a6Z6RnYOre/exec";

        function App() {
            // Login & Auth State
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem("diac_user") || null);
            const [isHoc, setIsHoc] = useState(() => localStorage.getItem("diac_ishoc") === "true");
            const [authError, setAuthError] = useState("");
            const [authLoading, setAuthLoading] = useState(false);

            // App Data States
            const [activeTab, setActiveTab] = useState("roster");
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [absences, setAbsences] = useState([]);
            const [classes, setClasses] = useState([]);
            const [attendanceStudents, setAttendanceStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [syncTime, setSyncTime] = useState("");

            // Navigation / Detail Modals
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCabinFilter, setSelectedCabinFilter] = useState("All");

            // Bulk Attendance Report states
            const [attendanceSession, setAttendanceSession] = useState("S1");
            const [attendanceClass, setAttendanceClass] = useState("");
            const [attendanceStates, setAttendanceStates] = useState({});
            const [isSubmittingAttendance, setIsSubmittingAttendance] = useState(false);

            // Initialize Google SSO Login Interface
            useEffect(() => {
                if (currentUser) return;
                
                const initGis = () => {
                    if (typeof google !== 'undefined') {
                        google.accounts.id.initialize({
                            client_id: GOOGLE_CLIENT_ID,
                            callback: handleGoogleSsoCallback
                        });
                        
                        google.accounts.id.renderButton(
                            document.getElementById("googleBtnContainer"),
                            { theme: "filled_blue", size: "large", width: "280", text: "signin_with" }
                        );
                    } else {
                        setTimeout(initGis, 500);
                    }
                };
                initGis();
            }, [currentUser]);

            // Handle callback when Google Auth completes successfully
            const handleGoogleSsoCallback = async (response) => {
                const idToken = response.credential;
                setAuthLoading(true);
                setAuthError("");

                try {
                    const res = await fetch(`${API_URL}?action=login&token=${idToken}`);
                    const data = await res.json();

                    if (data && data.success) {
                        setCurrentUser(data.email);
                        setIsHoc(data.isHoc);
                        localStorage.setItem("diac_user", data.email);
                        localStorage.setItem("diac_ishoc", data.isHoc ? "true" : "false");
                    } else {
                        setAuthError(data.error || "Single Sign-On authentication denied.");
                    }
                } catch (err) {
                    console.error("SSO Connection failed", err);
                    setAuthError("Failed to communicate with authorization server.");
                } finally {
                    setAuthLoading(false);
                }
            };

            // Fetch app data upon successful credentials validation
            useEffect(() => {
                if (!currentUser) return;

                const fetchData = async () => {
                    setLoading(true);
                    try {
                        const [studentsRes, scheduleRes, absencesRes, classesRes, attStudentsRes] = await Promise.all([
                            fetch(`${API_URL}?action=students`).then(r => r.json()),
                            fetch(`${API_URL}?action=schedule`).then(r => r.json()),
                            fetch(`${API_URL}?action=absences`).then(r => r.json()),
                            fetch(`${API_URL}?action=classes`).then(r => r.json()),
                            fetch(`${API_URL}?action=attStudents`).then(r => r.json())
                        ]);

                        setStudents(studentsRes);
                        setSchedule(scheduleRes);
                        setAbsences(absencesRes);
                        setClasses(classesRes);
                        setAttendanceStudents(attStudentsRes);

                        // Set Default class filter dynamically from class listings
                        if (classesRes && classesRes[attendanceSession] && classesRes[attendanceSession].length > 0) {
                            setAttendanceClass(classesRes[attendanceSession][0]);
                        }

                        const now = new Date();
                        setSyncTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    } catch (e) {
                        console.error("Error syncing app databases", e);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, [currentUser, attendanceSession]);

            // Filter students list based on Search terms and Cabin choice filters
            const filteredStudents = useMemo(() => {
                return students.filter(s => {
                    const fullName = `${s.firstName} ${s.lastName} ${s.preferredName}`.toLowerCase();
                    const matchesSearch = fullName.includes(searchTerm.toLowerCase()) || 
                                          s.cabin.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCabin = selectedCabinFilter === "All" || s.cabin === selectedCabinFilter;
                    return matchesSearch && matchesCabin;
                });
            }, [students, searchTerm, selectedCabinFilter]);

            const cabinOptions = useMemo(() => {
                const cabins = new Set(students.map(s => s.cabin).filter(Boolean));
                return ["All", ...Array.from(cabins).sort()];
            }, [students]);

            // Map Attendance Statuses dynamically based on classes chosen
            const attendanceListing = useMemo(() => {
                if (!attendanceClass) return [];
                return attendanceStudents.filter(s => {
                    const assignedActivity = s[attendanceSession];
                    return assignedActivity && assignedActivity.trim().toLowerCase() === attendanceClass.trim().toLowerCase();
                }).sort((a,b) => a.displayName.localeCompare(b.displayName));
            }, [attendanceStudents, attendanceSession, attendanceClass]);

            // Set default attendance state mapping
            useEffect(() => {
                const initial = {};
                attendanceListing.forEach(s => {
                    initial[s.displayName] = "Present";
                });
                setAttendanceStates(initial);
            }, [attendanceListing]);

            const handleAttendanceStateChange = (studentName, status) => {
                setAttendanceStates(prev => ({
                    ...prev,
                    [studentName]: status
                }));
            };

            const submitAttendanceReport = async () => {
                setIsSubmittingAttendance(true);
                const updates = attendanceListing.map(s => {
                    const studentObj = students.find(item => item.preferredName === s.displayName || `${item.firstName} ${item.lastName}` === s.displayName) || {};
                    return {
                        studentId: studentObj.stuNum || s.displayName,
                        studentName: s.displayName,
                        cabin: studentObj.cabin || "N/A",
                        session: attendanceSession,
                        activity: attendanceClass,
                        reportedBy: currentUser,
                        status: attendanceStates[s.displayName] || "Present"
                    };
                });

                try {
                    const response = await fetch(`${API_URL}?action=bulkReport`, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: `action=bulkReport&data=${encodeURIComponent(JSON.stringify(updates))}`
                    });
                    
                    // Force refresh downstream reports
                    setTimeout(async () => {
                        const absencesRes = await fetch(`${API_URL}?action=absences`).then(r => r.json());
                        setAbsences(absencesRes);
                        setIsSubmittingAttendance(false);
                        alert("Attendance filed successfully.");
                    }, 2000);
                } catch (err) {
                    console.error(err);
                    setIsSubmittingAttendance(false);
                    alert("Submission failed.");
                }
            };

            const updateAbsenceVerification = async (id, status) => {
                try {
                    const response = await fetch(`${API_URL}?action=updateAbsence&id=${id}&status=${status}`);
                    const data = await response.json();
                    if (data.success) {
                        setAbsences(prev => prev.map(item => item.ID === id ? { ...item, Status: status } : item));
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center bg-[#f8fafc] p-6 text-center select-none">
                        <div className="max-w-sm w-full bg-white rounded-[2.5rem] p-8 border border-slate-150 shadow-2xl scale-in">
                            <img src="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png" 
                                 className="w-24 h-24 mx-auto mb-6 drop-shadow-xl" 
                                 alt="DIAC Logo" />
                            
                            <h1 className="text-2xl font-black uppercase tracking-tight text-slate-900 mb-2">DIAC Staff Portal</h1>
                            <p className="text-xs text-slate-500 font-medium leading-relaxed mb-8">
                                Secure single sign-on access. Please use your official school board Google credentials to verify.
                            </p>

                            <div className="space-y-6">
                                {/* Secure Google SSO Button Container */}
                                <div className="flex justify-center border-y border-slate-100 py-6">
                                    <div id="googleBtnContainer"></div>
                                </div>

                                {authLoading && (
                                    <div className="text-xs text-blue-600 font-bold animate-pulse flex items-center justify-center gap-2">
                                        <div className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-ping"></div>
                                        <span>Checking authorizations...</span>
                                    </div>
                                )}

                                {authError && (
                                    <div className="text-xs text-rose-600 font-semibold bg-rose-50 p-3 rounded-2xl border border-rose-100">
                                        {authError}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 pb-28 relative flex flex-col">
                    {/* Header Banner */}
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 text-white">
                        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <img src="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png" className="w-10 h-10" alt="Logo" />
                                <div>
                                    <h1 className="text-base font-black tracking-tight uppercase leading-none">DIAC Hub</h1>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                                        Sync: {syncTime || 'fetching...'}
                                    </p>
                                </div>
                            </div>

                            {/* View Toggle */}
                            <div className="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                                <button onClick={() => setActiveTab('roster')} className={`px-4 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${activeTab === 'roster' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>Roster</button>
                                <button onClick={() => setActiveTab('schedule')} className={`px-4 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${activeTab === 'schedule' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>Schedule</button>
                                <button onClick={() => setActiveTab('attendance')} className={`px-4 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${activeTab === 'attendance' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>Attendance</button>
                                {isHoc && (
                                    <button onClick={() => setActiveTab('hoc')} className={`px-4 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${activeTab === 'hoc' ? 'bg-amber-600 text-white shadow-md' : 'text-amber-500/60'}`}>HOC</button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Main Content Renderers */}
                    <main className="max-w-xl mx-auto w-full px-4 pt-6 flex-grow">
                        {loading && (
                            <div className="flex flex-col justify-center items-center py-20 text-slate-400">
                                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div>
                                <p className="text-xs uppercase tracking-widest font-black animate-pulse">Syncing Cloud Database...</p>
                            </div>
                        )}

                        {!loading && activeTab === "roster" && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-[2rem] p-5 border border-slate-100 flex gap-3 items-center shadow-sm">
                                    <input 
                                        type="text" 
                                        placeholder="Search campers or cabin..." 
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="flex-1 bg-slate-50 border border-slate-200 rounded-2xl p-4 font-bold text-slate-850 placeholder-slate-400 focus:outline-none focus:border-blue-500 text-sm" />
                                    
                                    <select 
                                        value={selectedCabinFilter}
                                        onChange={e => setSelectedCabinFilter(e.target.value)}
                                        className="bg-slate-50 border border-slate-200 text-slate-700 font-bold rounded-2xl p-4 focus:outline-none text-sm min-w-[100px]">
                                        {cabinOptions.map(cabin => <option key={cabin} value={cabin}>{cabin}</option>)}
                                    </select>
                                </div>

                                <div className="space-y-3">
                                    {filteredStudents.map(student => (
                                        <div key={student.stuNum} onClick={() => setSelectedStudent(student)} className="bg-white hover:bg-slate-50 rounded-3xl p-4 border border-slate-100 shadow-sm flex items-center justify-between cursor-pointer transition-all active:scale-[0.98]">
                                            <div className="flex items-center gap-4">
                                                {/* Profile Photo Restoration */}
                                                {student.photo ? (
                                                    <img src={student.photo} className="w-12 h-12 rounded-2xl object-cover shadow-inner" alt={student.preferredName} />
                                                ) : (
                                                    <div className="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center font-black text-blue-600 text-lg">
                                                        {student.preferredName ? student.preferredName.charAt(0) : student.firstName.charAt(0)}
                                                    </div>
                                                )}
                                                <div>
                                                    <h4 className="font-extrabold text-slate-800">{student.preferredName}</h4>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">{student.cabin}</p>
                                                </div>
                                            </div>
                                            <span className="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full">{student.grade}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {!loading && activeTab === "schedule" && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-100 bg-slate-50">
                                                <th className="p-4 text-xs font-bold uppercase tracking-wider text-slate-500">Time</th>
                                                <th className="p-4 text-xs font-bold uppercase tracking-wider text-slate-500">Activity</th>
                                                <th className="p-4 text-xs font-bold uppercase tracking-wider text-slate-500">Location</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100/50">
                                            {schedule.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="p-4 text-xs font-black text-blue-600">{item["Time:"]}</td>
                                                    <td className="p-4 text-xs font-medium text-slate-800">{item["Activity:"]}</td>
                                                    <td className="p-4 text-xs text-slate-500 italic">{item["Location:"]}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {!loading && activeTab === "attendance" && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-[2rem] p-6 border border-slate-100 space-y-4 shadow-sm">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-450 tracking-wider block mb-2">Session</label>
                                            <select value={attendanceSession} onChange={e => setAttendanceSession(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-black text-slate-800 focus:outline-none">
                                                <option value="S1">Session 1</option>
                                                <option value="S2">Session 2</option>
                                                <option value="S3">Session 3</option>
                                                <option value="S4">Session 4</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-450 tracking-wider block mb-2">Activity/Class</label>
                                            <select value={attendanceClass} onChange={e => setAttendanceClass(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-black text-slate-800 focus:outline-none">
                                                {classes[attendanceSession]?.map(cls => <option key={cls} value={cls}>{cls}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {attendanceListing.map(camper => (
                                        <div key={camper.displayName} className="bg-white rounded-3xl p-4 border border-slate-100 shadow-sm flex items-center justify-between">
                                            <span className="font-extrabold text-slate-850">{camper.displayName}</span>
                                            <div className="flex gap-1 bg-slate-50 p-1 rounded-xl border border-slate-200">
                                                {["Present", "Absent"].map(state => {
                                                    const isChecked = (attendanceStates[camper.displayName] || "Present") === state;
                                                    return (
                                                        <button 
                                                            key={state}
                                                            onClick={() => handleAttendanceStateChange(camper.displayName, state)}
                                                            className={`px-3 py-1.5 text-[9px] font-black uppercase rounded-lg transition-all ${isChecked ? (state === 'Absent' ? 'bg-rose-600 text-white' : 'bg-blue-600 text-white') : 'text-slate-400'}`}>
                                                            {state}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    {attendanceListing.length > 0 && (
                                        <button 
                                            onClick={submitAttendanceReport}
                                            disabled={isSubmittingAttendance}
                                            className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-wider text-xs hover:bg-blue-750 active:scale-[0.98] transition-all mt-4 disabled:opacity-50 shadow-md shadow-blue-500/10">
                                            {isSubmittingAttendance ? 'Submitting...' : 'Submit Attendance Roll'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {!loading && activeTab === "hoc" && isHoc && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-[2rem] p-6 border border-slate-100 text-center shadow-sm">
                                    <h2 className="text-xl font-black text-slate-900 uppercase tracking-tight">HOC Incident Room</h2>
                                    <p className="text-[10px] font-bold text-amber-500 uppercase tracking-widest mt-1">Pending Absences and Verifications</p>
                                </div>

                                <div className="space-y-3">
                                    {absences.filter(item => item.Status === "Absent").map(item => (
                                        <div key={item.ID} className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm space-y-4">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[8px] font-black text-rose-600 uppercase tracking-widest bg-rose-50 px-2 py-0.5 rounded">Absence Reported</span>
                                                    <h3 className="text-base font-black text-slate-800 mt-2">{item.StudentName}</h3>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">{item.Cabin} &bull; Session {item.Session}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-extrabold text-slate-800">{item.Activity}</p>
                                                    <p className="text-[8px] text-slate-400 font-semibold mt-1">By {item.ReportedBy}</p>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                                                <button onClick={() => updateAbsenceVerification(item.ID, "Excused")} className="py-3 bg-emerald-50 text-emerald-600 rounded-xl font-black uppercase text-[10px] tracking-wider border border-emerald-100 hover:bg-emerald-100/50">Excused</button>
                                                <button onClick={() => updateAbsenceVerification(item.ID, "Resolved")} className="py-3 bg-blue-50 text-blue-600 rounded-xl font-black uppercase text-[10px] tracking-wider border border-blue-100 hover:bg-blue-100/50">Resolved</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Student Detail Modal Drawer */}
                        {selectedStudent && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center p-4" onClick={() => setSelectedStudent(null)}>
                                <div className="bg-white w-full max-w-md rounded-[2.5rem] p-6 border border-slate-100 overflow-y-auto max-h-[85vh] scroll-hide scale-in" onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-start mb-6 border-b border-slate-100 pb-4">
                                        <div className="flex items-center gap-4">
                                            {/* Photo inside Detail Modal */}
                                            {selectedStudent.photo ? (
                                                <img src={selectedStudent.photo} className="w-14 h-14 rounded-2xl object-cover shadow-md border border-slate-100" alt={selectedStudent.preferredName} />
                                            ) : (
                                                <div className="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center font-black text-blue-600 text-xl">
                                                    {selectedStudent.preferredName ? selectedStudent.preferredName.charAt(0) : selectedStudent.firstName.charAt(0)}
                                                </div>
                                            )}
                                            <div>
                                                <h3 className="text-xl font-black text-slate-900">{selectedStudent.preferredName}</h3>
                                                <p className="text-xs text-slate-500 mt-1">{selectedStudent.pronouns} &bull; Cabin: {selectedStudent.cabin}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setSelectedStudent(null)} className="p-2 bg-slate-50 text-slate-400 rounded-full hover:text-slate-600">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>

                                    <div className="space-y-4 text-sm text-slate-600">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <p className="text-[8px] font-black text-slate-400 uppercase">Birthdate</p>
                                                <p className="font-bold text-slate-800 mt-1">{selectedStudent.birthDate}</p>
                                            </div>
                                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <p className="text-[8px] font-black text-slate-400 uppercase">Grade</p>
                                                <p className="font-bold text-slate-800 mt-1">{selectedStudent.grade}</p>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-2">
                                            <p className="text-[8px] font-black text-slate-400 uppercase">Guardian Contacts</p>
                                            <p className="font-bold text-slate-800 text-xs">{selectedStudent.guardianFirstName} {selectedStudent.guardianLastName} ({selectedStudent.guardianPhone})</p>
                                            <p className="text-xs text-slate-500">{selectedStudent.guardianEmail}</p>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <p className="text-[8px] font-black text-slate-400 uppercase">Medical / Dietary Notes</p>
                                            <p className="font-extrabold text-amber-600 text-xs mt-1">Diet: {selectedStudent.dietary || 'None'}</p>
                                            <p className="font-extrabold text-rose-500 text-xs mt-1">Allergies: {selectedStudent.allergies || 'None'}</p>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                                            <p className="text-[8px] font-black text-slate-400 uppercase">Scheduled Rotations</p>
                                            <div className="grid grid-cols-2 gap-2 text-xs">
                                                <div>
                                                    <span className="text-[8px] font-bold text-slate-400">S1</span>
                                                    <p className="font-bold text-slate-800">{selectedStudent.s1Activity}</p>
                                                    <p className="text-[9px] text-slate-500 italic">{selectedStudent.s1Venue}</p>
                                                </div>
                                                <div>
                                                    <span className="text-[8px] font-bold text-slate-400">S2</span>
                                                    <p className="font-bold text-slate-800">{selectedStudent.s2Activity}</p>
                                                    <p className="text-[9px] text-slate-500 italic">{selectedStudent.s2Venue}</p>
                                                </div>
                                                <div>
                                                    <span className="text-[8px] font-bold text-slate-400">S3</span>
                                                    <p className="font-bold text-slate-800">{selectedStudent.s3Activity}</p>
                                                    <p className="text-[9px] text-slate-500 italic">{selectedStudent.s3Venue}</p>
                                                </div>
                                                <div>
                                                    <span className="text-[8px] font-bold text-slate-400">S4</span>
                                                    <p className="font-bold text-slate-800">{selectedStudent.s4Activity}</p>
                                                    <p className="text-[9px] text-slate-500 italic">{selectedStudent.s4Venue}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Integrated Logout/User Footer */}
                    <footer className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-xl flex justify-center pointer-events-none z-[60]">
                        <div className="bg-slate-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border border-white/10 pointer-events-auto">
                            <span className="text-[10px] font-black uppercase tracking-widest">{currentUser}</span>
                            <div className="w-[1px] h-3 bg-slate-700 mx-1"></div>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-[10px] font-black text-rose-400 uppercase tracking-widest">Exit</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
