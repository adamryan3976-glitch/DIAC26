<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
   
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DIAC Hub">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Gaegu:wght@400;700&display=swap');
       
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .whimsical-font { font-family: 'Gaegu', cursive; }

        .paint-splotch {
            position: fixed;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.15;
            pointer-events: none;
        }

        .splotch-1 { top: -5%; left: -5%; width: 300px; height: 300px; background: #6366f1; border-radius: 45% 55% 70% 30% / 30% 40% 60% 70%; }
        .splotch-2 { bottom: 10%; right: -10%; width: 250px; height: 250px; background: #f43f5e; border-radius: 70% 30% 30% 70% / 60% 40% 60% 40%; }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
       
        input, select { font-size: 16px !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900">
    <div class="paint-splotch splotch-1"></div>
    <div class="paint-splotch splotch-2"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // WEB APP URL PROVIDED BY USER
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0QvzsivrF70ibrKWCbf9ZDC2xG_tzNNrYNSKtbfsYmfe_bX_8jJCmornQO0xr14Ze/exec";
        const APP_LOGO_URL = "https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png";

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const s = String(url);
            if (s.includes('drive.google.com')) {
                let id = s.includes('id=') ? s.split('id=')[1].split('&')[0] : s.split('/file/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}=s400`;
            }
            return s;
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const [activeTab, setActiveTab] = useState('students');
            const [searchQuery, setSearchQuery] = useState('');
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [refreshing, setRefreshing] = useState(false);

            useEffect(() => {
                const savedUser = localStorage.getItem('diac_auth_user');
                const savedHoc = localStorage.getItem('diac_auth_hoc');
                if (savedUser) {
                    setIsAuthenticated(true);
                    setIsHoc(savedHoc === 'true');
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const [stu, sch] = await Promise.all([
                        fetch(`${SCRIPT_URL}?action=students`).then(r => r.json()),
                        fetch(`${SCRIPT_URL}?action=schedule`).then(r => r.json())
                    ]);
                    setStudents(stu || []);
                    setSchedule(sch || []);
                } catch (err) {
                    console.error("Data fetch failed:", err);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setLoginError('');
                
                try {
                    const user = loginData.user.trim();
                    const pass = loginData.pass.trim();
                    
                    const url = `${SCRIPT_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;
                    
                    const res = await fetch(url);
                    const result = await res.json();
                    
                    if (result.success) {
                        localStorage.setItem('diac_auth_user', user.toLowerCase());
                        localStorage.setItem('diac_auth_hoc', result.isHoc);
                        setIsAuthenticated(true);
                        setIsHoc(result.isHoc);
                        fetchData();
                    } else {
                        // Detailed error from server if available
                        setLoginError(result.error || 'Invalid username or password.');
                    }
                } catch (err) {
                    setLoginError('Server error. Ensure Script is deployed as "Anyone".');
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = () => {
                localStorage.clear();
                setIsAuthenticated(false);
                window.location.reload();
            };

            const processedStudents = useMemo(() => {
                if (!Array.isArray(students)) return [];
                return students.map((s, index) => ({
                    uid: index, 
                    displayName: s.ab, 
                    id: s.c, 
                    dob: s.d, 
                    pronouns: s.f, 
                    cabin: s.g || "Unassigned",
                    grade: s.m, 
                    school: s.n, 
                    photoUrl: s.o, 
                    dietary: s.p, 
                    allergies: s.q,
                    emergency: { name: `${s.h || ''} ${s.i || ''}`.trim(), phone: s.k }
                })).sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));
            }, [students]);

            const filteredStudents = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return processedStudents.filter(s =>
                    (s.displayName || "").toLowerCase().includes(q) ||
                    (s.cabin || "").toString().toLowerCase().includes(q)
                );
            }, [processedStudents, searchQuery]);

            useEffect(() => { lucide.createIcons(); }, [isAuthenticated, activeTab, selectedStudent, students]);

            if (!isAuthenticated) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 relative">
                    <div className="w-full max-w-sm animate-fade-in relative z-10">
                        <div className="text-center mb-10">
                            <div className="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl border-2 border-white overflow-hidden">
                                <img src={APP_LOGO_URL} alt="DIAC" className="w-full h-full object-contain p-2" />
                            </div>
                            <h1 className="text-3xl font-black text-indigo-600 whimsical-font tracking-tighter uppercase italic">DIAC HUB</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Staff Portal Login</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input 
                                type="text" placeholder="Username" required 
                                className="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-400 transition-all shadow-sm font-medium" 
                                value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} 
                            />
                            <input 
                                type="password" placeholder="Password" required 
                                className="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-400 transition-all shadow-sm font-medium" 
                                value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} 
                            />
                            {loginError && (
                                <div className="p-3 bg-rose-50 border border-rose-100 rounded-xl text-rose-600 text-[11px] font-bold text-center">
                                    {loginError}
                                </div>
                            )}
                            <button disabled={isLoggingIn} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase">
                                {isLoggingIn ? 'Verifying...' : 'Sign In'}
                            </button>
                        </form>
                        <p className="text-center text-[10px] text-slate-400 mt-6 uppercase font-bold tracking-widest">© 2026 DIAC Creative Hub</p>
                    </div>
                </div>
            );

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent"></div></div>;

            if (selectedStudent) return (
                <div className="min-h-screen bg-white pb-24 animate-fade-in">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                        <button onClick={() => setSelectedStudent(null)} className="p-2"><Icon name="arrow-left" /></button>
                        <h1 className="text-lg font-bold truncate whimsical-font">{selectedStudent.displayName}</h1>
                    </header>
                    <div className="p-6 space-y-6 max-w-xl mx-auto">
                        <div className="flex flex-col items-center text-center">
                            <div className="w-32 h-32 rounded-3xl overflow-hidden shadow-xl border-4 border-white mb-4 bg-slate-50 flex items-center justify-center">
                                {selectedStudent.photoUrl ? <img src={getDirectDriveUrl(selectedStudent.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" size={48} className="text-slate-200" />}
                            </div>
                            <h2 className="text-2xl font-black">{selectedStudent.displayName}</h2>
                            <span className="text-[10px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full uppercase mt-2">Cabin {selectedStudent.cabin}</span>
                        </div>
                        <div className="space-y-4">
                            <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100 grid grid-cols-2 gap-4">
                                <div><p className="text-[9px] font-bold text-slate-400 uppercase">School</p><p className="font-bold text-sm text-slate-700">{selectedStudent.school}</p></div>
                                <div><p className="text-[9px] font-bold text-slate-400 uppercase">Grade</p><p className="font-bold text-sm text-slate-700">{selectedStudent.grade}</p></div>
                            </div>
                            {(selectedStudent.dietary || selectedStudent.allergies) && (
                                <div className="bg-rose-50 p-5 rounded-3xl border border-rose-100">
                                    <h4 className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-2">Medical/Dietary</h4>
                                    <p className="text-sm font-bold text-rose-700">{selectedStudent.dietary} {selectedStudent.allergies}</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-24">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-lg">
                        <h1 className="text-xl font-black whimsical-font italic">DIAC HUB</h1>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className="p-2 bg-slate-800 rounded-xl"><Icon name="refresh-cw" size={18} className={refreshing ? 'animate-spin' : ''}/></button>
                            <button onClick={handleLogout} className="p-2 bg-slate-800 rounded-xl"><Icon name="log-out" size={18}/></button>
                        </div>
                    </header>

                    <main className="p-4 max-w-xl mx-auto space-y-4">
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                            <button onClick={() => setActiveTab('students')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'students' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Artists</button>
                            <button onClick={() => setActiveTab('schedule')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'schedule' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Schedule</button>
                        </div>

                        {activeTab === 'students' && (
                            <div className="space-y-3">
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Search name or cabin..." className="w-full bg-white border border-slate-200 p-4 pl-12 rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                <div className="grid gap-2">
                                    {filteredStudents.length > 0 ? filteredStudents.map(s => (
                                        <button key={s.uid} onClick={() => setSelectedStudent(s)} className="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between w-full shadow-sm active:scale-[0.98] transition-all text-left">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center border border-slate-100 overflow-hidden">
                                                    {s.photoUrl ? <img src={getDirectDriveUrl(s.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={20} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-900 leading-tight">{s.displayName}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase mt-0.5">Cabin {s.cabin}</div>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={18} className="text-slate-300" />
                                        </button>
                                    )) : (
                                        <div className="text-center p-10 text-slate-400 text-xs font-bold uppercase tracking-widest">No matching artists</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                {schedule.map((item, i) => (
                                    <div key={i} className="p-5 flex gap-5 border-b border-slate-50 last:border-0">
                                        <div className="text-indigo-600 font-black text-sm uppercase whimsical-font min-w-[75px]">{item.time}</div>
                                        <div>
                                            <div className="font-bold text-slate-900 leading-tight">{item.event}</div>
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center gap-1"><Icon name="map-pin" size={10} /> {item.location}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
