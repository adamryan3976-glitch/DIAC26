<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
    
    <!-- FAVICON & APP ICONS -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/diac-dev/diac-staff-hub/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/diac-dev/diac-staff-hub/main/diaclogo.png">
    
    <!-- iOS Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DIAC Hub">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Gaegu:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        .whimsical-font { font-family: 'Gaegu', cursive; }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        input, select { font-size: 16px !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .art-card { border-radius: 24px 8px 24px 8px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBs0TgB960mvNzIufQHhRRJ0ZIu6JpvD1XqV5i-37Y9V4CKwSqr13JoSdPyLMqHyJu/exec";
        const LOGO_URL = "https://raw.githubusercontent.com/diac-dev/diac-staff-hub/main/diaclogo.png";

        const Icon = ({ name, size = 20, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const stringUrl = String(url);
            if (stringUrl.includes('drive.google.com')) {
                let fileId = '';
                if (stringUrl.includes('id=')) {
                    fileId = stringUrl.split('id=')[1].split('&')[0];
                } else if (stringUrl.includes('/file/d/')) {
                    fileId = stringUrl.split('/file/d/')[1].split('/')[0];
                }
                if (fileId) return `https://lh3.googleusercontent.com/d/${fileId}=s400`;
            }
            return stringUrl;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [activeTab, setActiveTab] = useState('students');
            const [students, setStudents] = useState([]);
            const [absences, setAbsences] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            // Attendance States
            const [selectedSession, setSelectedSession] = useState('S1');
            const [selectedActivity, setSelectedActivity] = useState('');

            // Auth State
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');

            useEffect(() => {
                const user = localStorage.getItem('diac_user');
                const hoc = localStorage.getItem('diac_hoc') === 'true';
                if (user) {
                    setIsAuthenticated(true);
                    setIsHoc(hoc);
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const [stuRes, schRes, absRes] = await Promise.all([
                        fetch(`${SCRIPT_URL}?action=students`),
                        fetch(`${SCRIPT_URL}?action=schedule`),
                        fetch(`${SCRIPT_URL}?action=getAbsences`)
                    ]);
                    const stu = await stuRes.json();
                    const sch = await schRes.json();
                    const abs = await absRes.json();
                    
                    setStudents(stu);
                    setSchedule(sch);
                    setAbsences(abs);
                } catch (e) {
                    console.error("Sync error:", e);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            useEffect(() => { lucide.createIcons(); }, [activeTab, isAuthenticated, loading, selectedStudent]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(loginData.user)}&pass=${encodeURIComponent(loginData.pass)}`);
                    const result = await res.json();
                    if (result.success) {
                        localStorage.setItem('diac_user', loginData.user);
                        localStorage.setItem('diac_hoc', result.isHoc);
                        setIsAuthenticated(true);
                        setIsHoc(result.isHoc);
                        fetchData();
                    } else {
                        setLoginError("Invalid credentials");
                        setLoading(false);
                    }
                } catch (e) {
                    setLoginError("Connection failed");
                    setLoading(false);
                }
            };

            const processedStudents = useMemo(() => {
                return students.map((s, idx) => ({
                    uid: idx,
                    id: s.c,
                    displayName: s.ab || "Student " + (idx + 1),
                    dob: s.d,
                    pronouns: s.f,
                    cabin: s.g || "Unassigned",
                    school: s.n,
                    grade: s.m,
                    photo: s.o,
                    dietary: s.p,
                    allergies: s.q,
                    S1: s.r, S1V: s.s,
                    S2: s.t, S2V: s.u,
                    S3: s.v, S3V: s.w,
                    S4: s.x, S4V: s.y,
                    emergency: { name: `${s.h || ''} ${s.i || ''}`.trim(), phone: s.k, email: s.l }
                })).sort((a, b) => a.displayName.localeCompare(b.displayName));
            }, [students]);

            const filteredStudents = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return processedStudents.filter(s => 
                    s.displayName.toLowerCase().includes(q) || 
                    s.cabin.toString().toLowerCase().includes(q)
                );
            }, [processedStudents, searchQuery]);

            const attendanceOptions = useMemo(() => {
                const activities = processedStudents.map(s => s[selectedSession]).filter(Boolean);
                return [...new Set(activities)].sort();
            }, [processedStudents, selectedSession]);

            const toggleAttendance = async (student) => {
                if (!selectedActivity) return;
                const isAbsent = absences.some(a => a.studentId === student.id && a.session === selectedSession);
                
                // Optimistic UI
                if (isAbsent) {
                    setAbsences(prev => prev.filter(a => !(a.studentId === student.id && a.session === selectedSession)));
                } else {
                    setAbsences(prev => [...prev, { studentId: student.id, studentName: student.displayName, session: selectedSession, activity: selectedActivity }]);
                }

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: isAbsent ? 'markPresent' : 'markAbsent',
                            studentId: student.id,
                            studentName: student.displayName,
                            cabin: student.cabin,
                            session: selectedSession,
                            activity: selectedActivity,
                            reportedBy: localStorage.getItem('diac_user')
                        })
                    });
                } catch (e) { console.error(e); }
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="flex flex-col items-center">
                        <img src={LOGO_URL} className="w-16 h-16 animate-pulse mb-4" />
                        <p className="whimsical-font text-indigo-600 text-xl font-bold">PREPARING HUB...</p>
                    </div>
                </div>
            );

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="w-full max-w-sm animate-fade-in">
                        <div className="text-center mb-8">
                            <img src={LOGO_URL} className="w-24 mx-auto mb-4" />
                            <h1 className="text-3xl font-black text-indigo-600 whimsical-font">STAFF LOGIN</h1>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="text" placeholder="Username" required className="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-400" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                            <input type="password" placeholder="Password" required className="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-400" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            {loginError && <p className="text-rose-500 text-center font-bold text-xs">{loginError}</p>}
                            <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ENTER HUB</button>
                        </form>
                    </div>
                </div>
            );

            if (selectedStudent) return (
                <div className="min-h-screen bg-white pb-10 animate-fade-in">
                    <header className="bg-indigo-600 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                        <button onClick={() => setSelectedStudent(null)} className="p-1"><Icon name="chevron-left" size={28} /></button>
                        <h1 className="text-xl font-bold truncate whimsical-font">{selectedStudent.displayName}</h1>
                    </header>
                    <div className="p-6 max-w-md mx-auto space-y-6">
                        <div className="flex flex-col items-center">
                            <div className="w-32 h-32 rounded-3xl bg-slate-100 overflow-hidden shadow-xl border-4 border-white mb-4">
                                {selectedStudent.photo ? <img src={getDirectDriveUrl(selectedStudent.photo)} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="user" size={48} /></div>}
                            </div>
                            <h2 className="text-2xl font-black text-slate-900 whimsical-font">{selectedStudent.displayName}</h2>
                            <span className="text-[10px] font-black bg-amber-100 text-amber-700 px-3 py-1 rounded-full uppercase mt-2">Cabin {selectedStudent.cabin}</span>
                        </div>
                        
                        <div className="bg-slate-50 p-5 rounded-[32px] space-y-4">
                            <DataRow label="School" value={selectedStudent.school} />
                            <DataRow label="Birthdate" value={selectedStudent.dob} />
                            <DataRow label="Grade" value={selectedStudent.grade} />
                            <DataRow label="Dietary" value={selectedStudent.dietary} color="text-rose-600" />
                            <DataRow label="Allergies" value={selectedStudent.allergies} color="text-rose-600" />
                        </div>

                        <div className="bg-indigo-50 p-5 rounded-[32px] space-y-4">
                            <h3 className="text-xs font-black text-indigo-600 uppercase tracking-widest">Emergency Contact</h3>
                            <DataRow label="Name" value={selectedStudent.emergency.name} />
                            <DataRow label="Phone" value={selectedStudent.emergency.phone} />
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-indigo-600 text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <img src={LOGO_URL} className="w-8 h-8 brightness-0 invert" />
                            <h1 className="text-xl font-black whimsical-font tracking-wide">DIAC HUB</h1>
                        </div>
                        <button onClick={fetchData} className={`p-2 bg-indigo-500 rounded-xl ${refreshing ? 'animate-spin' : ''}`}><Icon name="refresh-cw" size={18} /></button>
                    </header>

                    <nav className="flex p-2 gap-1 bg-white/80 backdrop-blur sticky top-[72px] z-40 border-b overflow-x-auto no-scrollbar">
                        <NavTab id="students" label="Artists" active={activeTab} set={setActiveTab} />
                        <NavTab id="attendance" label="Attendance" active={activeTab} set={setActiveTab} />
                        {isHoc && <NavTab id="missing" label="Missing" active={activeTab} set={setActiveTab} />}
                        <NavTab id="schedule" label="Schedule" active={activeTab} set={setActiveTab} />
                    </nav>

                    <main className="p-4 max-w-md mx-auto space-y-4">
                        {activeTab === 'students' && (
                            <>
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Search artists or cabins..." className="w-full bg-white border-2 border-slate-100 py-4 pl-12 pr-4 rounded-2xl shadow-sm outline-none" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                <div className="grid gap-2">
                                    {filteredStudents.map(s => (
                                        <button key={s.uid} onClick={() => setSelectedStudent(s)} className="bg-white p-3 rounded-2xl border flex items-center justify-between active:scale-95 transition-all text-left shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className="w-12 h-12 rounded-xl bg-slate-100 overflow-hidden flex items-center justify-center">
                                                    {s.photo ? <img src={getDirectDriveUrl(s.photo)} className="w-full h-full object-cover" /> : <Icon name="user" size={20} className="text-slate-300" />}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-800">{s.displayName}</p>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase">Cabin {s.cabin}</p>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={16} className="text-slate-300" />
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}

                        {activeTab === 'attendance' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="grid grid-cols-4 gap-1 bg-slate-100 p-1 rounded-xl">
                                    {['S1', 'S2', 'S3', 'S4'].map(s => (
                                        <button key={s} onClick={() => { setSelectedSession(s); setSelectedActivity(''); }} className={`py-2 rounded-lg font-black text-xs transition-all ${selectedSession === s ? 'bg-indigo-600 text-white shadow' : 'text-slate-400'}`}>{s}</button>
                                    ))}
                                </div>
                                
                                <select className="w-full p-4 rounded-2xl bg-white border-2 border-slate-100 font-bold outline-none" value={selectedActivity} onChange={e => setSelectedActivity(e.target.value)}>
                                    <option value="">Select Workshop...</option>
                                    {attendanceOptions.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>

                                {selectedActivity ? (
                                    <div className="grid gap-2">
                                        {processedStudents.filter(s => s[selectedSession] === selectedActivity).map(s => {
                                            const isAbsent = absences.some(a => a.studentId === s.id && a.session === selectedSession);
                                            return (
                                                <button key={s.id} onClick={() => toggleAttendance(s)} className={`p-4 rounded-2xl border-2 flex items-center justify-between transition-all ${isAbsent ? 'bg-rose-50 border-rose-200' : 'bg-white border-white shadow-sm'}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black ${isAbsent ? 'bg-rose-500 text-white' : 'bg-indigo-100 text-indigo-600'}`}>{s.displayName.charAt(0)}</div>
                                                        <p className={`font-bold ${isAbsent ? 'text-rose-900' : 'text-slate-800'}`}>{s.displayName}</p>
                                                    </div>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${isAbsent ? 'bg-rose-600 border-rose-600 text-white' : 'border-slate-200'}`}><Icon name="check" size={14} /></div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="py-20 text-center text-slate-300 font-bold uppercase whimsical-font text-xl">Choose a session to start</div>
                                )}
                            </div>
                        )}

                        {activeTab === 'missing' && (
                            <div className="space-y-4 animate-fade-in">
                                <h2 className="whimsical-font text-2xl font-black text-rose-600">Missing Artists</h2>
                                {absences.length === 0 ? (
                                    <div className="p-10 text-center bg-white rounded-3xl border border-dashed text-slate-400 font-bold">Everyone is present!</div>
                                ) : (
                                    absences.map((a, i) => (
                                        <div key={i} className="bg-white p-5 rounded-3xl border-2 border-rose-100 shadow-sm flex items-center justify-between">
                                            <div>
                                                <p className="font-bold text-slate-900 text-lg">{a.studentName}</p>
                                                <p className="text-[10px] font-black text-rose-600 uppercase tracking-widest">{a.session} • {a.activity}</p>
                                            </div>
                                            <div className="text-[10px] font-bold text-slate-400">Cabin {a.cabin}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl border overflow-hidden shadow-sm">
                                {schedule.map((item, i) => (
                                    <div key={i} className="p-4 border-b last:border-0 flex gap-4">
                                        <span className="text-indigo-600 font-black text-xs pt-1 min-w-[60px]">{item.time}</span>
                                        <div>
                                            <p className="font-bold text-slate-800">{item.event}</p>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{item.location}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 w-full p-4 flex justify-center pointer-events-none safe-bottom">
                        <div className="bg-indigo-600/90 text-white px-6 py-2 rounded-full text-[10px] font-black tracking-widest shadow-xl whimsical-font">DIAC 2026</div>
                    </footer>
                </div>
            );
        }

        const NavTab = ({ id, label, active, set }) => (
            <button onClick={() => set(id)} className={`flex-shrink-0 px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${active === id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>{label}</button>
        );

        const DataRow = ({ label, value, color = "text-slate-700" }) => {
            if (!value || value === " " || value === "N/A") return null;
            return (
                <div className="border-b border-slate-200/50 pb-2 last:border-0 last:pb-0">
                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">{label}</p>
                    <p className={`text-sm font-semibold ${color}`}>{value}</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
