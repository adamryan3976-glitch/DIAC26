<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAC Staff Hub</title>
   
    <!-- FAVICON & APP ICONS -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png">
   
    <!-- iOS Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DIAC Hub">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Gaegu:wght@400;700&display=swap');
       
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .whimsical-font { font-family: 'Gaegu', cursive; }

        .paint-splotch {
            position: fixed;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.1;
            pointer-events: none;
        }

        .splotch-1 { top: -10%; left: -10%; width: 350px; height: 350px; background: #6366f1; border-radius: 50%; }
        .splotch-2 { bottom: -10%; right: -10%; width: 300px; height: 300px; background: #f43f5e; border-radius: 50%; }

        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
       
        input { font-size: 16px !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-900">
    <div class="paint-splotch splotch-1"></div>
    <div class="paint-splotch splotch-2"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UPDATED WEB APP URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypz6JUbTrfQd8Mbg5yCovmXONgdTQgFHv9B4NVjqe1nxs_4yW0n_GeHSYKcrxEdtJU/exec";
        const APP_LOGO_URL = "https://raw.githubusercontent.com/adamryan3976-glitch/DIAC26/main/diaclogo.png";

        const getDirectDriveUrl = (url) => {
            if (!url) return null;
            const s = String(url);
            if (s.includes('drive.google.com')) {
                let id = s.includes('id=') ? s.split('id=')[1].split('&')[0] : s.split('/file/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}=s400`;
            }
            return s;
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isHoc, setIsHoc] = useState(false);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const [activeTab, setActiveTab] = useState('students');
            const [searchQuery, setSearchQuery] = useState('');
            const [students, setStudents] = useState([]);
            const [schedule, setSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [refreshing, setRefreshing] = useState(false);

            useEffect(() => {
                const savedUser = localStorage.getItem('diac_auth_user');
                const savedHoc = localStorage.getItem('diac_auth_hoc');
                if (savedUser) {
                    setIsAuthenticated(true);
                    setIsHoc(savedHoc === 'true');
                    fetchData();
                } else {
                    setLoading(false);
                }
            }, []);

            const fetchData = async () => {
                setRefreshing(true);
                try {
                    const [stuRes, schRes] = await Promise.all([
                        fetch(`${SCRIPT_URL}?action=students`),
                        fetch(`${SCRIPT_URL}?action=schedule`)
                    ]);
                    const stu = await stuRes.json();
                    const sch = await schRes.json();
                    
                    setStudents(Array.isArray(stu) ? stu : []);
                    setSchedule(Array.isArray(sch) ? sch : []);
                } catch (err) {
                    console.error("Data fetch failed:", err);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setLoginError('');
                try {
                    const url = `${SCRIPT_URL}?action=login&user=${encodeURIComponent(loginData.user)}&pass=${encodeURIComponent(loginData.pass)}`;
                    const res = await fetch(url);
                    const result = await res.json();
                    
                    if (result && result.success) {
                        localStorage.setItem('diac_auth_user', loginData.user.toLowerCase());
                        localStorage.setItem('diac_auth_hoc', result.isHoc);
                        setIsAuthenticated(true);
                        setIsHoc(result.isHoc);
                        fetchData();
                    } else {
                        setLoginError(result.error || 'Access Denied: Check Credentials.');
                    }
                } catch (err) {
                    setLoginError('Server connection error.');
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = () => {
                localStorage.clear();
                window.location.reload();
            };

            const processedStudents = useMemo(() => {
                return students.map((s, index) => ({
                    uid: index, 
                    // Using Column AC (ac) from Code.gs for Preferred Full Name
                    displayName: s.ac || `${s.a || ''} ${s.b || ''}`.trim() || "Artist", 
                    id: s.c,           
                    cabin: s.g || "N/A", 
                    school: s.n || "DIAC", 
                    photoUrl: s.o,      
                    dietary: s.p,       
                    allergies: s.q      
                })).sort((a, b) => a.displayName.localeCompare(b.displayName));
            }, [students]);

            const filteredStudents = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return processedStudents.filter(s =>
                    s.displayName.toLowerCase().includes(q) ||
                    s.cabin.toString().toLowerCase().includes(q)
                );
            }, [processedStudents, searchQuery]);

            const cabinGroups = useMemo(() => {
                const groups = {};
                processedStudents.forEach(s => {
                    const c = s.cabin || "Unassigned";
                    if (!groups[c]) groups[c] = [];
                    groups[c].push(s);
                });
                return groups;
            }, [processedStudents]);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
                </div>
            );

            if (!isAuthenticated) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                    <div className="w-full max-w-sm animate-fade-in">
                        <div className="text-center mb-10">
                            <img src={APP_LOGO_URL} alt="DIAC" className="w-24 h-24 mx-auto mb-6 object-contain" />
                            <h1 className="text-3xl font-black text-indigo-600 whimsical-font italic uppercase">DIAC HUB</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Staff Portal Access</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input 
                                type="text" placeholder="Username" required 
                                className="w-full bg-white border border-slate-200 p-4 rounded-2xl shadow-sm outline-none focus:border-indigo-500 font-medium" 
                                value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} 
                            />
                            <input 
                                type="password" placeholder="Password" required 
                                className="w-full bg-white border border-slate-200 p-4 rounded-2xl shadow-sm outline-none focus:border-indigo-500 font-medium" 
                                value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} 
                            />
                            {loginError && <p className="text-rose-500 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl">{loginError}</p>}
                            <button disabled={isLoggingIn} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase">
                                {isLoggingIn ? 'Verifying...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );

            if (selectedStudent) return (
                <div className="min-h-screen bg-white animate-fade-in">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex items-center gap-4">
                        <button onClick={() => setSelectedStudent(null)} className="p-2 active:bg-slate-800 rounded-xl"><Icon name="arrow-left" /></button>
                        <h1 className="text-lg font-bold truncate whimsical-font">{selectedStudent.displayName}</h1>
                    </header>
                    <div className="p-6 space-y-6 max-w-xl mx-auto pb-24 text-center">
                        <div className="w-40 h-40 rounded-3xl overflow-hidden shadow-xl mx-auto border-4 border-white bg-slate-50 flex items-center justify-center">
                            {selectedStudent.photoUrl ? <img src={getDirectDriveUrl(selectedStudent.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" size={64} className="text-slate-200" />}
                        </div>
                        <h2 className="text-2xl font-black">{selectedStudent.displayName}</h2>
                        <div className="bg-slate-50 p-6 rounded-3xl text-left border border-slate-100 space-y-4">
                            <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Cabin</p><p className="font-bold text-slate-700">{selectedStudent.cabin}</p></div>
                            <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">School</p><p className="font-bold text-slate-700">{selectedStudent.school}</p></div>
                            {(selectedStudent.dietary || selectedStudent.allergies) && (
                                <div className="pt-4 border-t border-slate-200">
                                    <p className="text-[9px] font-bold text-rose-500 uppercase tracking-widest mb-1">Medical/Dietary</p>
                                    <p className="text-sm font-bold text-slate-600">
                                        {selectedStudent.dietary && <span>{selectedStudent.dietary}<br/></span>}
                                        {selectedStudent.allergies && <span>{selectedStudent.allergies}</span>}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-24">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center">
                        <div><h1 className="text-xl font-black whimsical-font italic">DIAC HUB</h1><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Staff Tools</p></div>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className="p-2 bg-slate-800 rounded-xl"><Icon name="refresh-cw" size={18} className={refreshing ? 'animate-spin' : ''}/></button>
                            <button onClick={handleLogout} className="p-2 bg-slate-800 rounded-xl text-rose-400"><Icon name="log-out" size={18}/></button>
                        </div>
                    </header>

                    <main className="p-4 max-w-xl mx-auto space-y-4">
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto no-scrollbar">
                            <button onClick={() => setActiveTab('students')} className={`flex-1 min-w-[90px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'students' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Artists</button>
                            <button onClick={() => setActiveTab('attendance')} className={`flex-1 min-w-[90px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'attendance' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Roll Call</button>
                            {isHoc && <button onClick={() => setActiveTab('hocs')} className={`flex-1 min-w-[90px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'hocs' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>HOCs</button>}
                            <button onClick={() => setActiveTab('schedule')} className={`flex-1 min-w-[90px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'schedule' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Schedule</button>
                        </div>

                        {activeTab === 'students' && (
                            <div className="space-y-3 animate-fade-in">
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Search artists..." className="w-full bg-white border border-slate-200 p-4 pl-12 rounded-3xl shadow-sm outline-none font-medium" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                <div className="grid gap-2">
                                    {filteredStudents.length > 0 ? filteredStudents.map(s => (
                                        <button key={s.uid} onClick={() => setSelectedStudent(s)} className="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between w-full shadow-sm text-left">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden border border-slate-100">
                                                    {s.photoUrl ? <img src={getDirectDriveUrl(s.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-200" size={20} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-900 leading-tight">{s.displayName}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Cabin {s.cabin}</div>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={18} className="text-slate-200" />
                                        </button>
                                    )) : (
                                        <div className="text-center py-10 text-slate-400 text-xs font-bold uppercase">No Artists found</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'attendance' && (
                            <div className="bg-indigo-900 text-white p-8 rounded-3xl text-center space-y-4 animate-fade-in shadow-xl">
                                <Icon name="clipboard-check" size={48} className="mx-auto text-indigo-300" />
                                <h2 className="text-xl font-black whimsical-font uppercase italic">Roll Call Center</h2>
                                <p className="text-sm font-medium text-indigo-200 opacity-80">Safety checks and attendance are currently managed via HOC logs. Access restricted.</p>
                            </div>
                        )}

                        {activeTab === 'hocs' && (
                            <div className="space-y-4 animate-fade-in">
                                {Object.entries(cabinGroups).sort().map(([cabin, members]) => (
                                    <div key={cabin} className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                        <div className="bg-slate-900 text-white px-5 py-3 flex justify-between items-center">
                                            <span className="font-black whimsical-font uppercase tracking-widest italic">Cabin {cabin}</span>
                                            <span className="text-[10px] font-black bg-indigo-500/30 px-2 py-0.5 rounded-full">{members.length} Artists</span>
                                        </div>
                                        <div className="p-2 divide-y divide-slate-50">
                                            {members.map(m => (
                                                <div key={m.uid} className="flex items-center gap-3 p-3">
                                                    <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center overflow-hidden border">
                                                        {m.photoUrl ? <img src={getDirectDriveUrl(m.photoUrl)} className="w-full h-full object-cover" /> : <Icon name="user" size={14} className="text-slate-300" />}
                                                    </div>
                                                    <span className="text-sm font-bold text-slate-700">{m.displayName}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden animate-fade-in">
                                {schedule.length > 0 ? schedule.map((item, i) => (
                                    <div key={i} className="p-5 flex gap-5 border-b border-slate-50 last:border-0">
                                        <div className="text-indigo-600 font-black text-sm uppercase whimsical-font min-w-[75px]">{item.time}</div>
                                        <div>
                                            <div className="font-bold text-slate-900">{item.event}</div>
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center gap-1"><Icon name="map-pin" size={10} /> {item.location}</div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="p-10 text-center text-slate-400 text-sm font-bold uppercase tracking-widest whimsical-font">No Creative Plans Yet</div>
                                )}
                            </div>
                        )}
                    </main>
                    
                    <footer className="fixed bottom-0 left-0 w-full p-4 pointer-events-none flex justify-center z-40 safe-bottom">
                        <div className="px-6 py-2 bg-indigo-600/10 backdrop-blur-md rounded-full border border-indigo-600/10 text-[9px] font-black uppercase text-indigo-600 tracking-[0.3em] whimsical-font italic">
                            DIAC 2026
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
